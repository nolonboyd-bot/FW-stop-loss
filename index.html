<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FW Walkaway · Prop Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#111826; --bg2:#172030; --bg3:#1c2a3e; --card:#192234;
  --border:#2a3f5c; --border2:#344e70;
  --text:#eaf2ff; --text2:#7a9ec4; --text3:#3a5878;
  --green:#00c96a; --green2:#00ff84; --red:#f04060; --gold:#f0b000; --gold2:#ffd040;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SIDE SLOGANS ── */
.side-left,.side-right{writing-mode:vertical-rl;text-orientation:mixed;font-family:'Bebas Neue',sans-serif;position:fixed;top:50%;z-index:10;user-select:none;pointer-events:none;}
.side-left{left:0;transform:translateY(-50%) rotate(180deg);font-size:clamp(32px,4.5vw,62px);color:transparent;-webkit-text-stroke:2px var(--green);animation:sloganGlow 4s ease-in-out infinite;padding:16px 8px;letter-spacing:10px;}
.side-right{right:0;transform:translateY(-50%);font-size:clamp(18px,2.4vw,36px);color:transparent;-webkit-text-stroke:2px var(--gold);animation:sloganGlow2 4s ease-in-out infinite 2s;padding:16px 8px;letter-spacing:8px;}
@keyframes sloganGlow{0%,100%{opacity:.35;text-shadow:0 0 15px #00c96a11}50%{opacity:1;text-shadow:0 0 35px #00c96a88,0 0 60px #00c96a33}}
@keyframes sloganGlow2{0%,100%{opacity:.35;text-shadow:0 0 15px #f0b00011}50%{opacity:1;text-shadow:0 0 35px #f0b00088,0 0 60px #f0b00033}}

.app-main{margin:0 72px;}
@media(max-width:600px){.app-main{margin:0 38px;}.side-left,.side-right{font-size:22px;padding:10px 4px;}}

/* ── ANIMATIONS ── */
@keyframes printOut{0%{transform:translateY(-110%) scaleY(0);opacity:0}55%{opacity:1}100%{transform:translateY(80px) scaleY(1);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) rotate(-10deg);opacity:.9}100%{transform:translateY(-110px) rotate(14deg);opacity:0}}
@keyframes floatUpR{0%{transform:translateY(0) rotate(8deg);opacity:.9}100%{transform:translateY(-95px) rotate(-16deg);opacity:0}}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
@keyframes gearSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes gearRev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pulseDot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes winFlash{0%{background:var(--card)}30%{background:#0a2a18}100%{background:var(--card)}}
@keyframes lossFlash{0%{background:var(--card)}30%{background:#2a0a12}100%{background:var(--card)}}
@keyframes scanLine{0%{top:-5%}100%{top:105%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* ── HEADER ── */
.machine-header{position:relative;background:linear-gradient(160deg,#0d1828 0%,#111f34 50%,#0d1828 100%);border-bottom:2px solid #00c96a44;overflow:hidden;padding:16px 20px 18px;}
.machine-header::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00c96a04 2px,#00c96a04 4px);pointer-events:none;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00c96a44,transparent);animation:scanLine 3s linear infinite;pointer-events:none;z-index:3;}
.header-ticker{position:absolute;bottom:0;left:0;right:0;height:20px;background:#00c96a;overflow:hidden;display:flex;align-items:center;}
.ticker-txt{white-space:nowrap;font-size:9px;letter-spacing:2px;color:#000;font-family:'Bebas Neue',sans-serif;animation:ticker 22s linear infinite;padding-right:80px;}
.hd-body{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;padding-bottom:22px;}
.hd-machine{display:flex;align-items:center;gap:12px;}
.gear-wrap{position:relative;width:50px;height:50px;flex-shrink:0;}
.g-big{position:absolute;top:0;left:0;animation:gearSpin 3.5s linear infinite;transform-origin:center;}
.g-sm{position:absolute;bottom:-4px;right:-4px;animation:gearRev 2.2s linear infinite;transform-origin:center;}
.printer-box{position:relative;width:88px;height:56px;background:linear-gradient(180deg,#0a1828 0%,#060f1e 100%);border:1px solid #1e3a5a;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.printer-screen{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:60px;height:16px;background:#020a14;border-radius:3px;border:1px solid #0a2040;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:9px;color:#00c96a;letter-spacing:2px;}
.printer-lights{display:flex;gap:4px;position:absolute;top:8px;right:8px;}
.plight{width:5px;height:5px;border-radius:50%;}
.plight.g{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulseDot 1.1s ease-in-out infinite;}
.plight.y{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulseDot 1.1s ease-in-out infinite .37s;}
.plight.r{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulseDot 1.1s ease-in-out infinite .74s;}
.printer-slot{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:62px;height:4px;background:#010810;border-radius:2px;}
.bill-out{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:54px;height:24px;border-radius:3px;background:linear-gradient(135deg,#0f4a28,#00c96a,#0f4a28);border:1px solid #00c96a66;animation:printOut 2.2s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;color:#fff;letter-spacing:1px;}
.bill-out2{animation-delay:1.1s;}
.hd-title{text-align:center;flex:1;}
.hd-title .main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:7px;color:var(--green);line-height:1;text-shadow:0 0 20px #00c96a55;}
.hd-title .sub{font-size:8px;letter-spacing:3px;color:var(--text2);margin-top:3px;text-transform:uppercase;}
.float-bills{position:absolute;right:18px;top:6px;display:flex;gap:10px;z-index:1;}
.fbill{font-size:18px;opacity:.6;}
.fbill:nth-child(1){animation:floatUp 3.2s ease-in infinite;}
.fbill:nth-child(2){animation:floatUpR 3.2s ease-in infinite .9s;}
.fbill:nth-child(3){animation:floatUp 3.2s ease-in infinite 1.7s;}
.fbill:nth-child(4){animation:floatUpR 3.2s ease-in infinite .4s;}

/* ── APP NAV TABS ── */
.app-nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.nav-tab{flex:1;padding:14px 8px;background:none;border:none;color:var(--text2);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--green);border-bottom:2px solid var(--green);}
.nav-tab:hover:not(.active){color:var(--text);}

/* ── TRACKER ── */
.tracker-wrap{min-height:100vh;background:var(--bg);color:var(--text);padding:18px 20px 80px;position:relative;}
.tracker-wrap::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,#00c96a0c 0%,transparent 65%),radial-gradient(ellipse at 100% 100%,#f0b0000a 0%,transparent 50%);pointer-events:none;z-index:0;}
.tracker-wrap > *{position:relative;z-index:1;}

/* ── CARDS ── */
.dark-card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px #00000044;}

/* ── CONTENT GRID ── */
.content-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:700px){.content-grid{grid-template-columns:1fr 1fr;}.content-grid .full-col{grid-column:1/-1;}}
@media(min-width:1100px){.content-grid{grid-template-columns:1fr 1fr 1fr;}}

/* ── HEALTH BAR ── */
.health-card{padding:20px;}
.health-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
.health-label{font-size:8px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;}
.health-pct{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;}
.bar-track{height:8px;background:#0a1528;border-radius:4px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1),background .3s;}
.health-sub{display:flex;justify-content:space-between;font-size:9px;color:var(--text2);letter-spacing:1px;}

/* ── METRICS ── */
.metric{padding:16px 12px;text-align:center;}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;margin-bottom:4px;}
.metric-label{font-size:7px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;}

/* ── RISK BOX ── */
.risk-box{padding:24px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.risk-label{font-size:8px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;}
.risk-amount{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--green);letter-spacing:2px;line-height:1;text-shadow:0 0 24px #00c96a55;}
.risk-formula{font-size:10px;color:var(--text2);margin-top:6px;letter-spacing:1px;}
.risk-pool-label{font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:4px;margin-top:14px;}
.risk-pool-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);letter-spacing:1px;}

/* ── FORMS ── */
.section-lbl{font-size:8px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:14px;}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-label{font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;}
.tinput,.tselect{background:#0f1c2e;border:1px solid var(--border);border-radius:7px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
.tinput:focus,.tselect:focus{border-color:var(--green);box-shadow:0 0 0 3px #00c96a18;}
.tinput::placeholder{color:var(--text3);}
.tselect option{background:#0d1525;color:var(--text);}
.add-btn{width:100%;border:none;border-radius:7px;padding:14px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;cursor:pointer;transition:all .2s;margin-top:4px;font-weight:900;}
.shimmer-btn{background:linear-gradient(90deg,#00c96a 0%,#00ff84 40%,#00c96a 60%,#009e50 100%);background-size:200% 100%;animation:shimmer 2.5s linear infinite;}
.shimmer-btn:hover{filter:brightness(1.15);}
.payout-shimmer{background:linear-gradient(90deg,#c89000 0%,#ffd040 40%,#f0b000 60%,#c89000 100%);background-size:200% 100%;animation:shimmer 2.5s linear infinite;}

/* ── LOG ── */
.log-section{overflow:hidden;}
.log-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.clear-btn{font-size:8px;letter-spacing:2px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;text-transform:uppercase;}
.clear-btn:hover{color:var(--red);}
.empty-log{padding:32px 20px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;}
.win-row-anim{animation:winFlash 1s ease forwards;}
.loss-row-anim{animation:lossFlash 1s ease forwards;}
.trade-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;transition:color .2s;}
.trade-del:hover{color:var(--red);}
.green{color:var(--green);}.red{color:var(--red);}
.danger-banner{background:#1a0810;border:1px solid #f0406044;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:10px;color:var(--red);letter-spacing:1px;}

/* ── FIRM TABS ── */
.firm-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.firm-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.firm-tab.active{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 12px #00c96a44;}
.firm-tab:hover:not(.active){border-color:var(--green);color:var(--green);}
.firm-add-btn{padding:8px 14px;border-radius:20px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.firm-add-btn:hover{border-color:var(--green);color:var(--green);}

/* ── CSV IMPORT ── */
.csv-drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:#0d1828;}
.csv-drop:hover,.csv-drop.dragover{border-color:var(--green);background:#041a10;}
.csv-drop input{display:none;}

/* ── CORNER GRAPHICS ── */
.corner-printer{position:fixed;bottom:20px;opacity:.08;pointer-events:none;z-index:0;font-size:80px;animation:floatUp 6s ease-in-out infinite;}
.corner-left{left:60px;}
.corner-right{right:60px;animation-delay:3s;}
</style>
</head>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const DIVISOR = 7;
const INSTRUMENTS = {
  MNQ:{ name:'MNQ', label:'Micro Nasdaq',  tickValue:0.5,  tickSize:0.25, defaultTicks:40 },
  MES:{ name:'MES', label:'Micro S&P 500', tickValue:1.25, tickSize:0.25, defaultTicks:20 },
  MGC:{ name:'MGC', label:'Micro Gold',    tickValue:1.0,  tickSize:0.10, defaultTicks:25 },
  MYM:{ name:'MYM', label:'Micro Dow',     tickValue:0.5,  tickSize:1.0,  defaultTicks:30 },
};

const FIRM_COLORS = ['#00c96a','#3b82f6','#f0b000','#a855f7','#e03a52','#06b6d4','#f97316','#10b981'];

const DEFAULT_FIRMS = [
  { id:'firm-1', name:'Topstep',          color:'#00c96a' },
  { id:'firm-2', name:'TakeProfit',        color:'#3b82f6' },
  { id:'firm-3', name:'Apex',              color:'#f97316' },
  { id:'firm-4', name:'Lucid',             color:'#a855f7' },
  { id:'firm-5', name:'Tradeday',          color:'#06b6d4' },
  { id:'firm-6', name:'MyFundedFutures',   color:'#f0b000' },
  { id:'firm-7', name:'Bulenox',           color:'#e03a52' },
];

// ─── CSV PARSER ───────────────────────────────
// Supports NinjaTrader, Tradovate, Rithmic, TradeStation, generic
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  const trades = [];

  const findCol = (...keys) => {
    for (const k of keys) {
      const idx = headers.findIndex(h => h.includes(k));
      if (idx !== -1) return idx;
    }
    return -1;
  };

  const pnlIdx   = findCol('pnl','profit','netloss','net','realized','amount');
  const labelIdx = findCol('instrument','symbol','contract','market','name','desc');
  const timeIdx  = findCol('time','date','entry','exectime','timestamp');
  const sideIdx  = findCol('side','action','direction','type','buysell');

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
    if (cols.length < 2) continue;

    let pnl = pnlIdx >= 0 ? parseFloat(cols[pnlIdx]?.replace(/[$,()]/g,'')) : NaN;
    if (isNaN(pnl)) {
      // Try to find any numeric column that looks like PnL
      for (let j = 0; j < cols.length; j++) {
        const v = parseFloat(cols[j]?.replace(/[$,()]/g,''));
        if (!isNaN(v) && Math.abs(v) > 0 && Math.abs(v) < 100000) { pnl = v; break; }
      }
    }
    if (isNaN(pnl)) continue;

    // Handle parentheses as negative: (500) = -500
    if (cols[pnlIdx]?.includes('(')) pnl = -Math.abs(pnl);

    const label = labelIdx >= 0 ? cols[labelIdx] : (sideIdx >= 0 ? cols[sideIdx] : `Trade ${i}`);
    const time  = timeIdx >= 0 ? cols[timeIdx]?.substring(0,16) : new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    trades.push({
      id: Date.now() + i,
      label: label || `Trade ${i}`,
      pnl: pnl,
      instrument: 'MNQ',
      time: time,
      imported: true,
    });
  }
  return trades;
}

// ─── GEAR SVG ─────────────────────────────────
function GearSVG({size,color}){
  const r=size/2,teeth=8,ir=r*.55,tr=r*.85,tw=.28;
  let d='';
  for(let i=0;i<teeth;i++){
    const a0=(i*2*Math.PI/teeth)-Math.PI/teeth;
    const a1=a0+tw,a2=a0+Math.PI/teeth-tw,a3=a0+Math.PI/teeth;
    d+=`L${r+tr*Math.cos(a0)} ${r+tr*Math.sin(a0)} L${r+tr*Math.cos(a1)} ${r+tr*Math.sin(a1)} `;
    d+=`L${r+r*Math.cos(a2)} ${r+r*Math.sin(a2)} L${r+r*Math.cos(a3)} ${r+r*Math.sin(a3)} `;
  }
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <path d={`M${r+tr} ${r} ${d}Z`} fill={color} opacity=".9"/>
      <circle cx={r} cy={r} r={ir} fill="#04091a"/>
      <circle cx={r} cy={r} r={ir*.38} fill={color} opacity=".5"/>
    </svg>
  );
}

// ─── HEADER ───────────────────────────────────
function MoneyMachineHeader(){
  return(
    <div className="machine-header">
      <div className="scan-line"/>
      <div className="float-bills">
        <span className="fbill">💵</span><span className="fbill">🪙</span>
        <span className="fbill">💵</span><span className="fbill">💰</span>
      </div>
      <div className="hd-body">
        <div className="hd-machine">
          <div className="gear-wrap">
            <div className="g-big"><GearSVG size={34} color="#00c96a"/></div>
            <div className="g-sm"><GearSVG size={21} color="#f0b000"/></div>
          </div>
          <div className="printer-box">
            <div className="printer-screen">$$$</div>
            <div className="printer-lights"><div className="plight g"/><div className="plight y"/><div className="plight r"/></div>
            <div className="printer-slot"/>
            <div className="bill-out">$$$</div>
          </div>
          <div className="gear-wrap">
            <div className="g-big"><GearSVG size={28} color="#f0b000"/></div>
            <div className="g-sm"><GearSVG size={18} color="#00c96a"/></div>
          </div>
        </div>

        <div className="hd-title">
          <div style={{display:'flex',justifyContent:'center',alignItems:'flex-end',gap:'6px',marginBottom:'8px'}}>
            <svg width="38" height="48" viewBox="0 0 38 48" fill="none">
              <ellipse cx="19" cy="14" rx="9" ry="10" fill="#3d1f0a"/>
              <path d="M10 12 Q7 4 14 3 Q19 1 24 3 Q31 4 28 12 Q26 6 19 6 Q12 6 10 12Z" fill="#1a0a00"/>
              <path d="M8 14 Q6 10 10 8 Q8 16 10 20Z" fill="#1a0a00"/>
              <path d="M30 14 Q32 10 28 8 Q30 16 28 20Z" fill="#1a0a00"/>
              <ellipse cx="19" cy="34" rx="11" ry="13" fill="#8B4513"/>
              <rect x="12" y="28" width="14" height="18" rx="3" fill="#c0392b"/>
              <ellipse cx="19" cy="14" rx="9" ry="10" fill="#3d1f0a"/>
              <circle cx="16" cy="13" r="1.2" fill="#1a0a00"/><circle cx="22" cy="13" r="1.2" fill="#1a0a00"/>
              <path d="M16 17 Q19 19 22 17" stroke="#1a0a00" strokeWidth="1" fill="none"/>
              <ellipse cx="15.5" cy="13.5" r=".5" fill="#fff"/><ellipse cx="21.5" cy="13.5" r=".5" fill="#fff"/>
            </svg>
            <svg width="36" height="50" viewBox="0 0 36 50" fill="none">
              <ellipse cx="18" cy="13" rx="9" ry="9.5" fill="#2c0f05"/>
              <path d="M9 13 Q9 6 18 5 Q27 6 27 13 Q27 8 18 8 Q9 8 9 13Z" fill="#0a0500"/>
              <ellipse cx="18" cy="32" rx="11" ry="14" fill="#6B3410"/>

// ─── WEEKLY CHART ──────────────────────────────
function WeeklyChart({trades, firmColor}){
  const weeks = useMemo(()=>{
    if(!trades.length) return [];
    const byWeek={};
    trades.forEach(t=>{
      const d=new Date(t.id);
      const jan1=new Date(d.getFullYear(),0,1);
      const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
      byWeek[`W${wk}`]=(byWeek[`W${wk}`]||0)+t.pnl;
    });
    return Object.entries(byWeek).map(([k,v])=>({week:k,pnl:v})).slice(-8);
  },[trades]);

  if(!weeks.length) return(
    <div className="dark-card" style={{padding:'24px 20px',textAlign:'center'}}>
      <div style={{fontSize:'28px',marginBottom:'8px'}}>📈</div>
      <div style={{fontSize:'10px',color:'var(--text3)',letterSpacing:'2px',textTransform:'uppercase'}}>Log trades to see weekly chart</div>
    </div>
  );

  const maxVal=Math.max(...weeks.map(w=>Math.abs(w.pnl)),1);
  const chartH=130,barW=44,gap=62;
  const total=weeks.reduce((s,w)=>s+w.pnl,0);
  const barColor=firmColor||'var(--green)';

  return(
    <div className="dark-card" style={{padding:'16px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--text2)',textTransform:'uppercase'}}>📈 Weekly P&L</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',color:total>=0?'var(--green)':'var(--red)',letterSpacing:'1px'}}>{total>=0?'+':''}${Math.abs(total).toFixed(0)} total</div>
      </div>
      <div style={{overflowX:'auto'}}>
        <svg width={Math.max(320,weeks.length*gap+20)} height={chartH+48} style={{display:'block'}}>
          {[0,.25,.5,.75,1].map(p=>(
            <line key={p} x1="0" y1={chartH-12-(p*(chartH-30))} x2={weeks.length*gap+20} y2={chartH-12-(p*(chartH-30))} stroke="#1e3050" strokeWidth=".5" strokeDasharray="4,4"/>
          ))}
          {weeks.map((w,i)=>{
            const barH=Math.max(6,(Math.abs(w.pnl)/maxVal)*(chartH-28));
            const isPos=w.pnl>=0;
            const x=i*gap+8,baseline=chartH-12,y=isPos?baseline-barH:baseline;
            return(
              <g key={i}>
                <rect x={x+2} y={y+2} width={barW} height={barH} rx="5" fill={isPos?'#00c96a22':'#f0406022'}/>
                <rect x={x} y={y} width={barW} height={barH} rx="5" fill={isPos?'#00c96a':'#f04060'} opacity=".9"/>
                <rect x={x} y={isPos?y:y+barH-5} width={barW} height={5} rx="3" fill={isPos?'#00ff84':'#ff7090'} opacity=".5"/>
                <text x={x+barW/2} y={isPos?y-6:y+barH+14} textAnchor="middle" fontSize="9" fill={isPos?'#00c96a':'#f04060'} fontFamily="'DM Mono',monospace">
                  {isPos?'+':''}{Math.abs(w.pnl)>=1000?`${(w.pnl/1000).toFixed(1)}k`:w.pnl.toFixed(0)}
                </text>
                <text x={x+barW/2} y={chartH+34} textAnchor="middle" fontSize="9" fill="#3a5a80" fontFamily="'DM Mono',monospace">{w.week}</text>
              </g>
            );
          })}
          <line x1="0" y1={chartH-12} x2={weeks.length*gap+20} y2={chartH-12} stroke="#1e3050" strokeWidth="1.5"/>
        </svg>
      </div>
    </div>
  );
}

// ─── CSV IMPORT PANEL ──────────────────────────
function CSVImport({ onImport, firmName }) {
  const [dragging, setDragging] = useState(false);
  const [status, setStatus] = useState(null);
  const [preview, setPreview] = useState(null);
  const fileRef = useRef();

  const processFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const parsed = parseCSV(text);
      if (parsed.length === 0) {
        setStatus({ ok: false, msg: 'No trades found. Check your CSV format.' });
        setPreview(null);
      } else {
        const totalPnl = parsed.reduce((s,t) => s+t.pnl, 0);
        const wins = parsed.filter(t=>t.pnl>0).length;
        const losses = parsed.filter(t=>t.pnl<0).length;
        setPreview({ parsed, totalPnl, wins, losses, fileName: file.name });
        setStatus(null);
      }
    };
    reader.readAsText(file);
  };

  const confirmImport = () => {
    if (!preview) return;
    onImport(preview.parsed);
    setStatus({ ok: true, msg: `✅ Imported ${preview.parsed.length} trades into ${firmName}` });
    setPreview(null);
  };

  const cancelPreview = () => { setPreview(null); setStatus(null); };

  return (
    <div className="dark-card" style={{padding:'18px 20px',animation:'fadeIn .3s ease'}}>
      <div className="section-lbl">📂 Import CSV from Broker</div>
      <div style={{fontSize:'9px',color:'var(--text2)',letterSpacing:'1px',marginBottom:'14px',lineHeight:'1.6'}}>
        Supports: <span style={{color:'var(--green)'}}>NinjaTrader · Tradovate · Rithmic · TradeStation · Generic CSV</span><br/>
        Export your trade history from your platform and drop it here.
      </div>

      {/* Drop zone — hide when preview is showing */}
      {!preview && (
        <div
          className={`csv-drop${dragging?' dragover':''}`}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }}
        >
          <input ref={fileRef} type="file" accept=".csv,.txt" onChange={e => processFile(e.target.files[0])}/>
          <div style={{fontSize:'32px',marginBottom:'8px'}}>📄</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'16px',letterSpacing:'3px',color:'var(--text2)',marginBottom:'4px'}}>DROP CSV HERE</div>
          <div style={{fontSize:'9px',color:'var(--text3)',letterSpacing:'1px'}}>or click to browse</div>
        </div>
      )}

      {/* Preview confirmation */}
      {preview && (
        <div style={{border:'1px solid #00c96a44',borderRadius:'10px',overflow:'hidden',animation:'fadeIn .2s ease'}}>
          {/* Preview header */}
          <div style={{background:'#041a10',padding:'14px 16px',borderBottom:'1px solid #00c96a22'}}>
            <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--green)',textTransform:'uppercase',marginBottom:'4px'}}>📋 Preview — Confirm Import</div>
            <div style={{fontSize:'10px',color:'var(--text2)',letterSpacing:'1px'}}>{preview.fileName}</div>
          </div>
          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'0'}}>
            {[
              {val:preview.parsed.length, lbl:'Trades Found', c:'var(--text)'},
              {val:`${preview.wins}W / ${preview.losses}L`, lbl:'Win / Loss', c:'var(--text)'},
              {val:`${preview.parsed.length>0?Math.round((preview.wins/preview.parsed.length)*100):0}%`, lbl:'Win Rate', c:'var(--text)'},
              {val:`${preview.totalPnl>=0?'+':''}$${Math.abs(preview.totalPnl).toFixed(0)}`, lbl:'Total P&L', c:preview.totalPnl>=0?'var(--green)':'var(--red)'},
            ].map(({val,lbl,c},i)=>(
              <div key={lbl} style={{padding:'14px 12px',textAlign:'center',borderRight:i<3?'1px solid #0d1828':'none',borderBottom:'1px solid #0d1828'}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',color:c,letterSpacing:'1px',lineHeight:1}}>{val}</div>
                <div style={{fontSize:'7px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase',marginTop:'4px'}}>{lbl}</div>
              </div>
            ))}
          </div>
          {/* Sample trades */}
          <div style={{padding:'10px 16px',borderBottom:'1px solid #0d1828'}}>
            <div style={{fontSize:'8px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase',marginBottom:'6px'}}>Sample (first 3 trades)</div>
            {preview.parsed.slice(0,3).map((t,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:'10px',borderBottom:i<2?'1px solid #0a1525':'none'}}>
                <span style={{color:'var(--text2)'}}>{t.label}</span>
                <span style={{color:t.pnl>=0?'var(--green)':'var(--red)',fontFamily:"'Bebas Neue',sans-serif",fontSize:'13px'}}>
                  {t.pnl>=0?'+':''}${Math.abs(t.pnl).toFixed(0)}
                </span>
              </div>
            ))}
          </div>
          {/* Confirm / Cancel */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0'}}>
            <button onClick={cancelPreview} style={{
              padding:'14px',background:'#0d1828',border:'none',borderRight:'1px solid #0d1025',
              color:'var(--text2)',fontFamily:"'Bebas Neue',sans-serif",fontSize:'14px',letterSpacing:'2px',

              padding:'14px',border:'none',
              background:'linear-gradient(90deg,#00c96a,#00ff84)',
              color:'#000',fontFamily:"'Bebas Neue',sans-serif",fontSize:'14px',letterSpacing:'2px',
              cursor:'pointer',fontWeight:'900',
            }}>✓ CONFIRM IMPORT</button>
          </div>
        </div>
      )}

      {status && (
        <div style={{marginTop:'12px',padding:'10px 14px',borderRadius:'7px',background:status.ok?'#041a10':'#1a0810',border:`1px solid ${status.ok?'#00c96a33':'#f0406033'}`,fontSize:'11px',color:status.ok?'var(--green)':'var(--red)',letterSpacing:'1px'}}>
          {status.msg}
        </div>
      )}

      <div style={{marginTop:'14px',borderTop:'1px solid var(--border)',paddingTop:'14px'}}>
        <div style={{fontSize:'8px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase',marginBottom:'8px'}}>How to export from your platform</div>
        {[
          ['NinjaTrader','Account Performance → Trade History → Export to CSV'],
          ['Tradovate','Reports → Trade History → Download CSV'],
          ['Rithmic','R|Trader → Account → Trade Route History → Export'],
          ['TradeStation','Account → Trade Activity → Export'],
        ].map(([p,i])=>(
          <div key={p} style={{display:'flex',gap:'8px',marginBottom:'6px',fontSize:'9px'}}>
            <span style={{color:'var(--green)',minWidth:'90px'}}>{p}</span>
            <span style={{color:'var(--text3)'}}>{i}</span>
          </div>
        ))}
      </div>
    </div>
  );

function CalendarView({ trades, firmColor }) {
  const today = new Date();
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const fc = firmColor || '#00c96a';

  const dailyMap = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const d = new Date(t.id);
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if (!map[key]) map[key] = { pnl:0, wins:0, losses:0, count:0 };
      map[key].pnl += t.pnl;
      map[key].count++;
      t.pnl > 0 ? map[key].wins++ : map[key].losses++;
    });
    return map;
  }, [trades]);

  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const monthName   = new Date(viewYear, viewMonth).toLocaleString('default', { month:'long' });

  const prevMonth = () => viewMonth===0 ? (setViewMonth(11),setViewYear(y=>y-1)) : setViewMonth(m=>m-1);
  const nextMonth = () => viewMonth===11 ? (setViewMonth(0),setViewYear(y=>y+1)) : setViewMonth(m=>m+1);

  const monthTrades = useMemo(() => trades.filter(t => {
    const d = new Date(t.id);
    return d.getMonth()===viewMonth && d.getFullYear()===viewYear;
  }), [trades, viewMonth, viewYear]);

  const monthPnl = monthTrades.reduce((s,t) => s+t.pnl, 0);

  // Build weeks array: each week is [sun..sat] of day numbers (0 = empty)
  const weeks = [];
  let week = Array(firstDay).fill(0);
  for (let d = 1; d <= daysInMonth; d++) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) {
    while (week.length < 7) week.push(0);
    weeks.push(week);
  }

  // Weekly totals
  const weeklyTotals = weeks.map(wk => {
    let pnl = 0, count = 0;
    wk.forEach(d => {
      if (!d) return;
      const key = `${viewYear}-${viewMonth}-${d}`;
      if (dailyMap[key]) { pnl += dailyMap[key].pnl; count += dailyMap[key].count; }
    });
    return { pnl, count };
  });

  const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const fmt = (v) => {
    const abs = Math.abs(v);
    const s = abs >= 10000 ? `$${(v/1000).toFixed(1)}K` : `$${v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}`;
    return s;
  };

  return (
    <div style={{
      background:'#0d1826',
      border:'2px solid #000',
      borderRadius:'12px',
      overflow:'hidden',
      fontFamily:"'DM Mono',monospace",
    }}>
      {/* Header */}
      <div style={{
        background:'#0a1220',
        borderBottom:'1px solid #1a2a40',
        padding:'16px 20px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
      }}>
        <div>
          <div style={{display:'flex',alignItems:'baseline',gap:'12px'}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'26px',letterSpacing:'4px',color:'#fff'}}>
              {monthName.toUpperCase()} {viewYear}
            </div>
            <div style={{
              fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',letterSpacing:'2px',
              color:monthPnl>=0?'#00c96a':'#f04060',
              textShadow:monthPnl>=0?'0 0 12px #00c96a66':'0 0 12px #f0406066',
            }}>
              {monthPnl>=0?'+':''}{fmt(monthPnl)}
            </div>
          </div>
          <div style={{fontSize:'9px',letterSpacing:'2px',color:'#8ab0cc',marginTop:'2px',textTransform:'uppercase'}}>
            Return $ for the Month
          </div>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={prevMonth} style={{
            background:'rgba(255,255,255,.05)',border:'1px solid #1a2a40',borderRadius:'6px',
            color:'#7a9ec4',cursor:'pointer',padding:'8px 16px',
            fontFamily:"'Bebas Neue',sans-serif",fontSize:'13px',letterSpacing:'2px',
          }}>◀ PREV</button>
          <button onClick={nextMonth} style={{
            background:'rgba(255,255,255,.05)',border:'1px solid #1a2a40',borderRadius:'6px',
            color:'#7a9ec4',cursor:'pointer',padding:'8px 16px',
            fontFamily:"'Bebas Neue',sans-serif",fontSize:'13px',letterSpacing:'2px',
          }}>NEXT ▶</button>
        </div>
      </div>

      {/* Day headers + WEEKLY TOTALS label */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 120px',borderBottom:'1px solid #1a2a40'}}>
        {DAYS.map((d,i) => (
          <div key={d} style={{
            padding:'8px 10px',fontSize:'9px',letterSpacing:'3px',
            color: i===0||i===6 ? '#6a8aaa' : '#8ab0cc',
            textTransform:'uppercase',
            borderRight:'1px solid #1a2a40',
          }}>{d}</div>
        ))}
        <div style={{padding:'8px 10px',fontSize:'9px',letterSpacing:'2px',color:'#8ab0cc',textTransform:'uppercase',textAlign:'right'}}>
          WEEKLY<br/>TOTALS
        </div>
      </div>

      {/* Calendar rows */}
      {weeks.map((wk, wi) => (
        <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 120px',borderBottom: wi<weeks.length-1?'1px solid #1a2a40':'none'}}>
          {wk.map((day, di) => {
            if (!day) return (
              <div key={`e${di}`} style={{
                minHeight:'100px',padding:'10px 12px',
                background:'#090f1a',
                borderRight:'1px solid #1a2a40',
              }}/>
            );
            const key = `${viewYear}-${viewMonth}-${day}`;
            const d = dailyMap[key];
            const isToday = day===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
            const isWeekend = di===0||di===6;

            let bg = isWeekend ? '#090f1a' : '#0d1826';
            if (d) bg = d.pnl >= 0 ? '#0a2a1e' : '#2a0a14';
            if (isToday && !d) bg = '#0f1e34';

            const borderLeft = isToday ? `3px solid ${fc}` : d ? `3px solid ${d.pnl>=0?'#00c96a':'#f04060'}` : '1px solid #1a2a40';

            return (
              <div key={day} style={{
                minHeight:'100px',padding:'10px 12px',
                background:bg,
                borderRight:'1px solid #1a2a40',
                borderLeft,
                position:'relative',
              }}>
                {/* Day number */}
                <div style={{
                  fontSize:'15px',
                  color: isToday ? fc : d ? (d.pnl>=0?'#7af4c0':'#f0a0b0') : isWeekend ? '#4a6a80' : '#6a8aaa',
                  fontWeight: isToday ? 'bold' : 'normal',
                  marginBottom:'4px',
                }}>{day}</div>

                {/* PnL */}
                {d && (
                  <div style={{
                    fontFamily:"'Bebas Neue',sans-serif",
                    fontSize:'18px',letterSpacing:'1px',
                    color: d.pnl>=0 ? '#00c96a' : '#f04060',
                    lineHeight:1,
                  }}>
                    {d.pnl>=0?'':'-'}{fmt(Math.abs(d.pnl))}
                  </div>
                )}

                {/* Trade count */}
                {d && (
                  <div style={{
                    fontSize:'9px',color:'#8ab0cc',letterSpacing:'1px',marginTop:'3px',
                  }}>
                    {d.count} {d.count===1?'Trade':'Trades'}
                  </div>
                )}
              </div>
            );
          })}

          {/* Weekly total cell */}
          <div style={{
            minHeight:'100px',padding:'10px 12px',
            background:'#070d18',
            display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'flex-end',
          }}>
            {weeklyTotals[wi].count > 0 ? (
              <>
                <div style={{
                  fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',letterSpacing:'1px',
                  color: weeklyTotals[wi].pnl>=0 ? '#00c96a' : '#f04060',
                  textAlign:'right',
                }}>
                  {weeklyTotals[wi].pnl>=0?'+':''}{fmt(weeklyTotals[wi].pnl)}
                </div>
                <div style={{fontSize:'9px',color:'#8ab0cc',marginTop:'3px',textAlign:'right',letterSpacing:'1px'}}>
                  {weeklyTotals[wi].count} {weeklyTotals[wi].count===1?'Trade':'Trades'}
                </div>
              </>
            ) : (
              <>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'16px',color:'#4a6a80'}}>$0</div>
                <div style={{fontSize:'9px',color:'#4a6a80',marginTop:'3px',letterSpacing:'1px'}}>0 Trades</div>
              </>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── DAILY PNL FEED ───────────────────────────
function DailyFeed({ firms, firmData }) {
  const today = new Date();
  const todayStr = today.toDateString();

  const firmTotals = useMemo(() => {
    return firms.map(f => {
      const trades = firmData[f.id]?.trades || [];
      const todayTrades = trades.filter(t => new Date(t.id).toDateString() === todayStr);
      const pnl = todayTrades.reduce((s,t) => s + t.pnl, 0);
      const wins = todayTrades.filter(t => t.pnl > 0).length;
      const losses = todayTrades.filter(t => t.pnl < 0).length;
      return { ...f, pnl, wins, losses, count: todayTrades.length };
    }).filter(f => f.count > 0);
  }, [firms, firmData, todayStr]);

  const totalDailyPnl = firmTotals.reduce((s,f) => s + f.pnl, 0);
  const dateLabel = today.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' });

  return (
    <div className="dark-card" style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:'0'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
        <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--text2)',textTransform:'uppercase'}}>📅 Daily P&L</div>
        <div style={{fontSize:'9px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase'}}>{dateLabel}</div>
      </div>

      {firmTotals.length === 0 ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'12px 0',gap:'6px'}}>
          <div style={{fontSize:'22px',opacity:.4}}>📂</div>
          <div style={{fontSize:'9px',color:'var(--text3)',letterSpacing:'2px',textTransform:'uppercase',textAlign:'center'}}>Import a CSV to see today's P&L</div>
        </div>
      ) : (
        <>
          {/* Per-firm rows */}
          <div style={{display:'flex',flexDirection:'column',gap:'0'}}>
            {firmTotals.map((f, i) => (
              <div key={f.id} style={{
                display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'8px 0',
                borderBottom: i < firmTotals.length - 1 ? '1px solid var(--border)' : 'none',
              }}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <div style={{width:'6px',height:'6px',borderRadius:'50%',background:f.color,boxShadow:`0 0 6px ${f.color}`,flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:'11px',color:'var(--text)',letterSpacing:'1px'}}>{f.name}</div>
                    <div style={{fontSize:'8px',color:'var(--text3)',marginTop:'1px'}}>{f.wins}W · {f.losses}L · {f.count} trades</div>
                  </div>
                </div>
                <div style={{
                  fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',
                  color:f.pnl>=0?'var(--green)':'var(--red)',
                  letterSpacing:'1px',
                  textShadow:f.pnl>=0?'0 0 10px #00c96a44':'0 0 10px #f0406044',
                }}>
                  {f.pnl>=0?'+':''}${Math.abs(f.pnl).toFixed(0)}
                </div>
              </div>
            ))}
          </div>

          {/* Total bar */}
          <div style={{
            marginTop:'10px',paddingTop:'10px',
            borderTop:`1px solid ${totalDailyPnl>=0?'#00c96a33':'#f0406033'}`,
            display:'flex',justifyContent:'space-between',alignItems:'center',
          }}>
            <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--text2)',textTransform:'uppercase'}}>Total Today</div>
            <div style={{
              fontFamily:"'Bebas Neue',sans-serif",fontSize:'24px',

function FirmPage({ firm, data, onUpdate, firms, firmData }) {
  const [form, setForm] = useState({label:'',pnl:'',outcome:'win'});
  const [payoutForm, setPayoutForm] = useState({label:'',amount:''});
  const [showPayouts, setShowPayouts] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [lastAdded, setLastAdded] = useState(null);
  const [instrument, setInstrument] = useState(data.instrument||'MNQ');

  const trades = data.trades || [];
  const payouts = data.payouts || [];
  const balance = data.balance || '';
  const drawdown = data.drawdown || '';
  const inst = INSTRUMENTS[instrument];
  const startingDrawdown = parseFloat(drawdown) || 2500;

  const stats = useMemo(() => {
    const totalPnl = trades.reduce((s,t) => s+t.pnl, 0);
    const totalPayoutsAmt = payouts.reduce((s,p) => s+p.amount, 0);
    const currentPool = Math.max(0, startingDrawdown + totalPnl - totalPayoutsAmt);
    const riskPerTrade = currentPool / DIVISOR;
    const poolPct = Math.min(100, Math.max(0, ((startingDrawdown+totalPnl)/startingDrawdown)*100));
    const wins = trades.filter(t=>t.pnl>0).length;
    const losses = trades.filter(t=>t.pnl<0).length;
    const winRate = trades.length ? Math.round((wins/trades.length)*100) : 0;
    const isBlownOut = totalPnl <= -startingDrawdown;
    const remaining = startingDrawdown + totalPnl;
    const netProfit = totalPnl - totalPayoutsAmt;
    const winningTrades = trades.filter(t=>t.pnl>0);
    const losingTrades = trades.filter(t=>t.pnl<0);
    const avgWin = winningTrades.length ? winningTrades.reduce((s,t)=>s+t.pnl,0)/winningTrades.length : 0;
    const avgLoss = losingTrades.length ? Math.abs(losingTrades.reduce((s,t)=>s+t.pnl,0)/losingTrades.length) : 0;
    const profitFactor = (avgLoss && winningTrades.length && losingTrades.length) ? (winningTrades.reduce((s,t)=>s+t.pnl,0)/Math.abs(losingTrades.reduce((s,t)=>s+t.pnl,0))) : 0;
    const expectancy = trades.length ? totalPnl/trades.length : 0;
    const largestWin = winningTrades.length ? Math.max(...winningTrades.map(t=>t.pnl)) : 0;
    const largestLoss = losingTrades.length ? Math.min(...losingTrades.map(t=>t.pnl)) : 0;
    let winStreak=0,lossStreak=0,cw=0,cl=0;
    for(const t of [...trades].reverse()){if(t.pnl>0){cw++;cl=0;winStreak=Math.max(winStreak,cw);}else{cl++;cw=0;lossStreak=Math.max(lossStreak,cl);}}
    return{totalPnl,totalPayoutsAmt,currentPool,riskPerTrade,poolPct,wins,losses,winRate,isBlownOut,remaining,netProfit,avgWin,avgLoss,profitFactor,expectancy,largestWin,largestLoss,winStreak,lossStreak};
  },[trades,payouts,startingDrawdown]);

  const barColor = stats.poolPct>=60?'var(--green)':stats.poolPct>=30?'var(--gold)':'var(--red)';
  const maxContracts = Math.floor(stats.riskPerTrade/(inst.defaultTicks*inst.tickValue));
  const tableMax = Math.max(maxContracts+3,10);
  const tableRows=[];
  for(let c=tableMax;c>=1;c--){
    const maxTicks=Math.floor(stats.riskPerTrade/(c*inst.tickValue));
    const isAffordable=(c*inst.defaultTicks*inst.tickValue)<=stats.riskPerTrade;
    tableRows.push({contracts:c,maxTicks,isAffordable});
  }

  const addTrade = () => {
    const v=parseFloat(form.pnl);
    if(!form.pnl||isNaN(v)) return;
    const finalPnl=form.outcome==='win'?Math.abs(v):-Math.abs(v);
    const newId=Date.now();
    const newTrade={id:newId,label:form.label||`Trade ${trades.length+1}`,pnl:finalPnl,instrument,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
    onUpdate({...data,trades:[newTrade,...trades],instrument});
    setLastAdded(newId);
    setTimeout(()=>setLastAdded(null),1000);
    setForm({label:'',pnl:'',outcome:'win'});
  };
  const removeTrade = id => onUpdate({...data,trades:trades.filter(t=>t.id!==id)});

  const addPayout = () => {
    const amt=parseFloat(payoutForm.amount);
    if(!payoutForm.amount||isNaN(amt)||amt<=0) return;
    const newPayout={id:Date.now(),label:payoutForm.label||`Payout ${payouts.length+1}`,amount:amt,date:new Date().toLocaleDateString([],{month:'short',day:'numeric'}),time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
    onUpdate({...data,payouts:[newPayout,...payouts]});
    setPayoutForm({label:'',amount:''});
  };

  const removePayout = id => onUpdate({...data,payouts:payouts.filter(p=>p.id!==id)});

  const handleImport = (imported) => {
    onUpdate({...data,trades:[...imported,...trades]});
    setShowImport(false);
  };

  const inputStyle={fontSize:'14px',padding:'11px 14px'};

  return(
    <div className="tracker-wrap" style={{animation:'fadeIn .25s ease'}}>

            </button>

        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>

            <label className="input-label">Account Balance ($)</label>

          <div className="input-group">
            <label className="input-label">Max Drawdown ($)</label>

              value={drawdown}
              onChange={e=>onUpdate({...data,drawdown:e.target.value})}/>
          </div>
        </div>
        {drawdown&&(
          <div style={{marginTop:'10px',display:'flex',alignItems:'center',gap:'10px',background:'#041408',border:`1px solid ${fc}33`,borderRadius:'7px',padding:'10px 16px'}}>
            <div style={{fontSize:'22px'}}>🖨️</div>
            <div>
              <div style={{fontSize:'8px',letterSpacing:'2px',color:'var(--text2)',textTransform:'uppercase'}}>Risk / Trade</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'24px',color:fc,letterSpacing:'2px',lineHeight:1,textShadow:`0 0 16px ${fc}55`}}>
                ${(startingDrawdown/DIVISOR).toFixed(0)}

            <div style={{marginLeft:'auto',fontSize:'9px',color:'var(--text2)',letterSpacing:'1px'}}>${startingDrawdown.toLocaleString()} ÷ {DIVISOR}</div>
          </div>

      {/* Firm header bar */}
      <div style={{background:`${fc}11`,border:`1px solid ${fc}44`,borderRadius:'10px',padding:'12px 18px',marginBottom:'12px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>

        <div style={{display:'flex',gap:'8px'}}>

      </div>

      {showImport && <CSVImport onImport={handleImport} firmName={firm.name}/>}
      {!showImport && (

      {stats.isBlownOut && <div className="danger-banner">⚠ DRAWDOWN LIMIT REACHED ON {firm.name.toUpperCase()} — STOP TRADING</div>}

      <div className="content-grid">

          <div className="health-sub" style={{marginBottom: data.profitTarget ? '14px' : '0'}}>

          {/* Profit target bar */}

              {[
                {icon:'📊', val:`${stats.totalPnl>=0?'+':''}${stats.totalPnl.toFixed(0)}`, lbl:'Total P&L', c:stats.totalPnl>=0?'var(--green)':'var(--red)'},

              ))}
            </div>
          </div>
          {/* Daily P&L Feed */}
          <DailyFeed firms={firms||[]} firmData={firmData||{}} />
        </div>

        {/* Weekly Chart REMOVED */}
        {/* Advanced Metrics REMOVED */}

        {/* Bottom Row — Contracts LEFT | Log Trade + Journal + Payouts RIGHT */}

          {/* Contracts */}
          <div className="dark-card" style={{padding:'16px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
              <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--text2)',textTransform:'uppercase'}}>{inst.name} Contracts</div>
              <div style={{fontSize:'8px',letterSpacing:'2px',color:'var(--text2)',textTransform:'uppercase'}}>1 Tick = ${inst.tickValue.toFixed(2)}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px',marginBottom:'6px'}}>
              {['Contracts','Max Stop Ticks'].map(h=>(
                <div key={h} style={{fontSize:'7px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase',textAlign:'center',padding:'4px 0'}}>{h}</div>
              ))}
            </div>
            {tableRows.map(({contracts,maxTicks,isAffordable})=>(
              <div key={contracts} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px',marginBottom:'3px',background:isAffordable?'#041a10':'#060c18',border:isAffordable?`1px solid ${fc}33`:'1px solid var(--border)',borderRadius:'7px',padding:'9px',opacity:isAffordable?1:.35,transition:'all .3s'}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isAffordable?'22px':'16px',color:isAffordable?fc:'var(--text3)',textAlign:'center',lineHeight:1}}>{contracts}</div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>

                  </select>
                </div>
                <div className="input-group" style={{gridColumn:'1/-1'}}>
                  <label className="input-label">Dollar Amount ($)</label>
                  <input className="tinput" style={inputStyle} type="number" placeholder="e.g. 350" value={form.pnl}
                    onChange={e=>setForm(f=>({...f,pnl:e.target.value}))}
                    onKeyDown={e=>e.key==='Enter'&&addTrade()}/>
                </div>
              </div>
              <button className="add-btn shimmer-btn" onClick={addTrade}>+ LOG TRADE</button>
            </div>

            {/* Payouts */}
            <div className="dark-card log-section">

                <div style={{color:'var(--text2)',fontSize:'16px',transition:'transform .2s',transform:showPayouts?'rotate(180deg)':'rotate(0deg)'}}>▾</div>
              </div>
              {showPayouts&&(
                <div style={{padding:'16px 20px'}}>
                  {payouts.length>0&&(
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'16px'}}>
                      {[{val:stats.totalPnl,l:'Gross P&L',c:'var(--green)',bg:'#041a10',b:'#00c96a33'},{val:-stats.totalPayoutsAmt,l:'Paid Out',c:'var(--gold)',bg:'#1a1000',b:'#f0b00033'},{val:stats.netProfit,l:'Net Profit',c:stats.netProfit>=0?'var(--text)':'var(--red)',bg:'#0a1020',b:'var(--border)'}].map(({val,l,c,bg,b})=>(
                        <div key={l} style={{background:bg,border:`1px solid ${b}`,borderRadius:'7px',padding:'12px',textAlign:'center'}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:c,letterSpacing:'1px',lineHeight:1}}>{val>=0&&l!=='Paid Out'?'+':''}${Math.abs(val).toFixed(0)}</div>
                          <div style={{fontSize:'7px',letterSpacing:'2px',color:'var(--text2)',textTransform:'uppercase',marginTop:'5px'}}>{l}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
                    <div className="input-group">
                      <label className="input-label">Label</label>
                      <input className="tinput" style={inputStyle} placeholder="e.g. Weekly payout" value={payoutForm.label} onChange={e=>setPayoutForm(f=>({...f,label:e.target.value}))}/>
                    </div>
                    <div className="input-group">
                      <label className="input-label">Amount ($)</label>
                      <input className="tinput" style={inputStyle} type="number" placeholder="e.g. 500" value={payoutForm.amount}
                        onChange={e=>setPayoutForm(f=>({...f,amount:e.target.value}))}
                        onKeyDown={e=>e.key==='Enter'&&addPayout()}/>
                    </div>
                  </div>
                  <button className="add-btn payout-shimmer" onClick={addPayout}>+ LOG PAYOUT</button>
                  {payouts.length>0&&(
                    <div style={{borderTop:'1px solid var(--border)',marginTop:'14px',paddingTop:'4px'}}>
                      {payouts.map((p,i)=>(
                        <div key={p.id} style={{display:'grid',gridTemplateColumns:'32px 1fr auto auto',gap:'12px',alignItems:'center',padding:'13px 0',borderBottom:i<payouts.length-1?'1px solid var(--border)':'none'}}>
                          <div style={{fontSize:'10px',color:'var(--text2)',textAlign:'center'}}>{payouts.length-i}</div>
                          <div>
                            <div style={{fontSize:'14px',color:'var(--text)',marginBottom:'3px'}}>{p.label}</div>
                            <div style={{fontSize:'10px',color:'var(--text2)',letterSpacing:'1px'}}>{p.date} · {p.time}</div>
                          </div>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',color:'var(--gold)',letterSpacing:'1px',textAlign:'right'}}>+${p.amount.toFixed(0)}</div>
                          <button className="trade-del" onClick={()=>removePayout(p.id)}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

          </div>
        </div>

      </div>{/* end content-grid */}

      {/* Calendar View — full page width */}
      <div style={{marginTop:'12px'}}>
        <CalendarView trades={trades} firmColor={fc}/>
      </div>

      </>)}
    </div>
  );
}

// ─── SETTINGS PAGE ─────────────────────────────
function SettingsPage({ firms, setFirms, balance, setBalance, drawdown, setDrawdown }) {
  const [newFirmName, setNewFirmName] = useState('');

  const addFirm = () => {
    if (!newFirmName.trim() || firms.length >= 10) return;
    setFirms(prev => [...prev, {
      id: `firm-${Date.now()}`,
      name: newFirmName.trim(),
      color: FIRM_COLORS[prev.length % FIRM_COLORS.length],
    }]);
    setNewFirmName('');
  };

  const removeFirm = id => {
    if (firms.length <= 1) return;
    setFirms(prev => prev.filter(f => f.id !== id));
  };

  const renameFirm = (id, name) => setFirms(prev => prev.map(f => f.id===id ? {...f,name} : f));

  return (
    <div className="tracker-wrap" style={{animation:'fadeIn .25s ease'}}>
      <div className="dark-card" style={{padding:'20px',marginBottom:'12px'}}>
        <div className="section-lbl">⚙️ Global Account Settings</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
          <div className="input-group">
            <label className="input-label">Account Balance ($)</label>
            <input className="tinput" type="number" style={{fontSize:'14px',padding:'11px 14px'}} placeholder="e.g. 150000" value={balance} onChange={e=>setBalance(e.target.value)}/>
          </div>
          <div className="input-group">
            <label className="input-label">Max Drawdown ($)</label>
            <input className="tinput" type="number" style={{fontSize:'14px',padding:'11px 14px'}} placeholder="e.g. 4500" value={drawdown} onChange={e=>setDrawdown(e.target.value)}/>
          </div>
        </div>
        {drawdown&&(
          <div style={{display:'flex',alignItems:'center',gap:'10px',background:'#041408',border:'1px solid #00c96a33',borderRadius:'7px',padding:'10px 16px'}}>
            <div style={{fontSize:'22px'}}>🖨️</div>
            <div>
              <div style={{fontSize:'8px',letterSpacing:'2px',color:'var(--text2)',textTransform:'uppercase'}}>Risk / Trade</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'24px',color:'var(--green)',letterSpacing:'2px',lineHeight:1}}>${(parseFloat(drawdown)/DIVISOR).toFixed(0)}</div>
            </div>
            <div style={{marginLeft:'auto',fontSize:'9px',color:'var(--text2)'}}>${parseFloat(drawdown).toLocaleString()} ÷ {DIVISOR}</div>
          </div>
        )}
      </div>

      <div className="dark-card" style={{padding:'20px'}}>
        <div className="section-lbl">🏦 Manage Prop Firms ({firms.length}/10)</div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px'}}>
          {firms.map(f=>(
            <div key={f.id} style={{display:'flex',alignItems:'center',gap:'10px',background:'#0d1828',border:`1px solid ${f.color}33`,borderRadius:'8px',padding:'10px 14px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'50%',background:f.color,boxShadow:`0 0 6px ${f.color}`,flexShrink:0}}/>
              <input value={f.name} onChange={e=>renameFirm(f.id,e.target.value)}
                style={{flex:1,background:'transparent',border:'none',color:'var(--text)',fontFamily:"'DM Mono',monospace",fontSize:'14px',outline:'none'}}/>
              {firms.length>1&&(
                <button onClick={()=>removeFirm(f.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:'4px',padding:'4px 8px',color:'var(--text3)',cursor:'pointer',fontSize:'12px'}}>✕</button>
              )}
            </div>
          ))}
        </div>
        {firms.length < 10 && (
          <div style={{display:'flex',gap:'8px'}}>
            <input className="tinput" style={{fontSize:'14px',padding:'11px 14px'}} placeholder="New firm name (e.g. E8 Funding)" value={newFirmName} onChange={e=>setNewFirmName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addFirm()}/>
            <button className="add-btn shimmer-btn" style={{width:'auto',padding:'0 20px',whiteSpace:'nowrap'}} onClick={addFirm}>+ ADD</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP SHELL ─────────────────────────────────
function App(){
  const [firms, setFirms] = useState(DEFAULT_FIRMS);
  const [firmData, setFirmData] = useState({});
  const [activeFirmId, setActiveFirmId] = useState('firm-1');
  const [activeTab, setActiveTab] = useState('tracker'); // tracker | combined | settings
  const [balance, setBalance] = useState('');
  const [drawdown, setDrawdown] = useState('');

  // Load from localStorage
  useEffect(()=>{
    try {
      const saved = localStorage.getItem('fwWalkawayV6');
      if(saved){
        const d=JSON.parse(saved);
        if(d.firms) setFirms(d.firms);
        if(d.firmData) setFirmData(d.firmData);
        if(d.balance) setBalance(d.balance);
        if(d.drawdown) setDrawdown(d.drawdown);
        if(d.activeFirmId) setActiveFirmId(d.activeFirmId);
      }
    } catch(e){}
  },[]);

  // Auto-save
  useEffect(()=>{
    localStorage.setItem('fwWalkawayV6', JSON.stringify({firms,firmData,balance,drawdown,activeFirmId}));
  },[firms,firmData,balance,drawdown,activeFirmId]);

  const updateFirmData = (firmId, data) => setFirmData(prev => ({...prev,[firmId]:data}));

  const activeFirm = firms.find(f=>f.id===activeFirmId) || firms[0];

  return(
    <div>
      <MoneyMachineHeader/>

      {/* Top nav */}
      <div className="app-nav" style={{display:'flex',alignItems:'stretch'}}>
        {/* Firm tabs — spread evenly */}
        {firms.map((f, i)=>{
          const pnl=(firmData[f.id]?.trades||[]).reduce((s,t)=>s+t.pnl,0);
          const isActive=activeTab==='tracker'&&activeFirmId===f.id;
          return(
            <React.Fragment key={f.id}>
              {i > 0 && <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch',margin:'6px 0',flexShrink:0}}/>}
              <button className={`nav-tab${isActive?' active':''}`}
                style={{
                  color:isActive?f.color:'var(--text2)',
                  borderBottomColor:isActive?f.color:'transparent',
                  flex:1,
                  fontSize:'11px',
                  letterSpacing:'2px',
                  padding:'10px 4px',
                  whiteSpace:'nowrap',
                  overflow:'hidden',
                  textOverflow:'ellipsis',
                }}
                onClick={()=>{setActiveFirmId(f.id);setActiveTab('tracker');}}>
                {f.name}
                {pnl!==0&&<div style={{fontSize:'8px',color:pnl>=0?'var(--green)':'var(--red)',letterSpacing:'1px',marginTop:'1px'}}>{pnl>=0?'+':''}${Math.abs(pnl)>=1000?`${(pnl/1000).toFixed(1)}k`:pnl.toFixed(0)}</div>}
              </button>
            </React.Fragment>
          );
        })}
        {/* Separator before utility tabs */}
        <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch',margin:'6px 0',flexShrink:0}}/>
        <button className={`nav-tab${activeTab==='combined'?' active':''}`}
          style={{width:'60px',flexShrink:0,fontSize:'10px',padding:'10px 4px',letterSpacing:'1px'}}
          onClick={()=>setActiveTab('combined')}>📊<div style={{fontSize:'7px',marginTop:'1px',letterSpacing:'1px'}}>ALL</div>
        </button>
        <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch',margin:'6px 0',flexShrink:0}}/>
        <button className={`nav-tab${activeTab==='settings'?' active':''}`}
          style={{width:'50px',flexShrink:0,fontSize:'14px',padding:'10px 4px'}}
          onClick={()=>setActiveTab('settings')}>⚙️
        </button>
      </div>

      {activeTab==='tracker' && activeFirm && (
        <FirmPage
          firm={activeFirm}
          data={firmData[activeFirm.id]||{trades:[],payouts:[],instrument:'MNQ',balance:'',drawdown:''}}
          onUpdate={(data)=>updateFirmData(activeFirm.id,data)}
          firms={firms}
          firmData={firmData}
        />
      )}
      {activeTab==='combined' && (
        <div className="tracker-wrap"><CombinedDashboard firms={firms} firmData={firmData} balance={balance} drawdown={drawdown}/></div>
      )}
      {activeTab==='settings' && (
        <SettingsPage firms={firms} setFirms={setFirms} balance={balance} setBalance={setBalance} drawdown={drawdown} setDrawdown={setDrawdown}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
