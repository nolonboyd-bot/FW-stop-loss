!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FW Walkaway · Prop Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#111826; --bg2:#172030; --bg3:#1c2a3e; --card:#192234;
  --border:#2a3f5c; --border2:#344e70;
  --text:#eaf2ff; --text2:#7a9ec4; --text3:#3a5878;
  --green:#00c96a; --green2:#00ff84; --red:#f04060; --gold:#f0b000; --gold2:#ffd040;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* SIDE SLOGANS */
.side-left,.side-right{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:'Bebas Neue',sans-serif;letter-spacing:6px;
  position:fixed;top:50%;z-index:10;user-select:none;
  pointer-events:none;
}
.side-left{
  left:0;transform:translateY(-50%) rotate(180deg);
  font-size:clamp(32px,4.5vw,62px);
  color:transparent;-webkit-text-stroke:2px var(--green);
  text-shadow:0 0 30px #00c96a22;
  animation:sloganGlow 4s ease-in-out infinite;
  padding:16px 8px;letter-spacing:10px;
}
.side-right{
  right:0;transform:translateY(-50%);
  font-size:clamp(16px,2.1vw,32px);   /* Reduced size */
  color:transparent;-webkit-text-stroke:2px var(--gold);
  text-shadow:0 0 30px #f0b00022;
  animation:sloganGlow2 4s ease-in-out infinite 2s;
  padding:16px 8px;letter-spacing:8px;
}
@keyframes sloganGlow{0%,100%{opacity:.35;text-shadow:0 0 15px #00c96a11}50%{opacity:1;text-shadow:0 0 35px #00c96a88,0 0 60px #00c96a33}}
@keyframes sloganGlow2{0%,100%{opacity:.35;text-shadow:0 0 15px #f0b00011}50%{opacity:1;text-shadow:0 0 35px #f0b00088,0 0 60px #f0b00033}}

/* HEADER TICKER - slowed down */
.header-ticker{
  position:absolute;bottom:0;left:0;right:0;height:20px;
  background:#00c96a;overflow:hidden;display:flex;align-items:center;
}
.ticker-txt{
  white-space:nowrap;font-size:9px;letter-spacing:2px;color:#000;
  font-family:'Bebas Neue',sans-serif;
  animation:ticker 35s linear infinite;   /* Slowed from 22s to 35s */
  padding-right:80px;
}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}

/* Rest of your original styles (kept unchanged for consistency) */
.app-main{margin:0 72px;}
@media(max-width:600px){.app-main{margin:0 38px;}.side-left,.side-right{font-size:24px;padding:12px 5px;}}

.machine-header{
  position:relative;
  background:linear-gradient(160deg,#0d1828 0%,#111f34 50%,#0d1828 100%);
  border-bottom:2px solid #00c96a44;
  overflow:hidden;padding:16px 20px 18px;
}
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#00c96a44,transparent);
  animation:scanLine 3s linear infinite;pointer-events:none;z-index:3;
}
@keyframes scanLine{0%{top:-5%}100%{top:105%}}

.printer-box, .gear-wrap, .hd-title, .float-bills, .bill-out { /* kept your original printer styling */ }
.dark-card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px #00000044;}
.content-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:700px){.content-grid{grid-template-columns:1fr 1fr;}.content-grid .full-col{grid-column:1/-1;}}
@media(min-width:1100px){.content-grid{grid-template-columns:1fr 1fr 1fr;}}

.health-card{padding:20px;margin-bottom:0;}
.metric{padding:16px 12px;text-align:center;}
.risk-box{padding:24px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.section-lbl{font-size:8px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:14px;}
.tinput,.tselect{
  background:#0f1c2e;border:1px solid var(--border);border-radius:7px;
  padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
}
.tinput:focus,.tselect:focus{border-color:var(--green);box-shadow:0 0 0 3px #00c96a18;}
.add-btn{
  width:100%;border:none;border-radius:7px;padding:14px;color:#000;
  font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;
  cursor:pointer;transition:all .2s;margin-top:4px;font-weight:900;
}
.shimmer-btn{background:linear-gradient(90deg,#00c96a 0%,#00ff84 40%,#00c96a 60%,#009e50 100%);background-size:200% 100%;animation:shimmer 2.5s linear infinite;}
.payout-shimmer{background:linear-gradient(90deg,#c89000 0%,#ffd040 40%,#f0b000 60%,#c89000 100%);background-size:200% 100%;animation:shimmer 2.5s linear infinite;}
.log-section{overflow:hidden;}
.win-row-anim{animation:winFlash 1s ease forwards;}
.loss-row-anim{animation:lossFlash 1s ease forwards;}
</style>
</head>
<body>

<div class="side-left">TOLD YALL</div>
<div class="side-right">PUT SOME RESPECT ON MY NAME</div>
<div class="corner-printer corner-left">🖨️</div>
<div class="corner-printer corner-right">💵</div>

<div class="app-main">
<div id="root"></div>
</div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const DIVISOR = 7;

const INSTRUMENTS = {
  MNQ: { name:'MNQ', label:'Micro Nasdaq',   tickValue:0.5,  tickSize:0.25, defaultTicks:40 },
  MES: { name:'MES', label:'Micro S&P 500',  tickValue:1.25, tickSize:0.25, defaultTicks:20 },
  MGC: { name:'MGC', label:'Micro Gold',     tickValue:1.0,  tickSize:0.10, defaultTicks:25 },
  MYM: { name:'MYM', label:'Micro Dow',      tickValue:0.5,  tickSize:1.0,  defaultTicks:30 },
};

function GearSVG({size,color}){
  const r=size/2,teeth=8,ir=r*.55,tr=r*.85,tw=.28;
  let d='';
  for(let i=0;i<teeth;i++){
    const a0=(i*2*Math.PI/teeth)-Math.PI/teeth;
    const a1=a0+tw,a2=a0+Math.PI/teeth-tw,a3=a0+Math.PI/teeth;
    d+=`L${r+tr*Math.cos(a0)} ${r+tr*Math.sin(a0)} L${r+tr*Math.cos(a1)} ${r+tr*Math.sin(a1)} `;
    d+=`L${r+r*Math.cos(a2)} ${r+r*Math.sin(a2)} L${r+r*Math.cos(a3)} ${r+r*Math.sin(a3)} `;
  }
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <path d={`M${r+tr} ${r} ${d}Z`} fill={color} opacity=".9"/>
    <circle cx={r} cy={r} r={ir} fill="#04091a"/>
    <circle cx={r} cy={r} r={ir*.38} fill={color} opacity=".5"/>
  </svg>;
}

function MoneyMachineHeader(){
  return (
    <div className="machine-header">
      <div className="scan-line"/>
      <div className="float-bills">
        <span className="fbill">💵</span><span className="fbill">🪙</span><span className="fbill">💵</span><span className="fbill">💰</span>
      </div>
      <div className="hd-body">
        {/* Left Machine + Center Title + Right Machine - kept exactly as before */}
        <div className="hd-machine">
          <div className="gear-wrap"><div className="g-big"><GearSVG size={34} color="#00c96a"/></div><div className="g-sm"><GearSVG size={21} color="#f0b000"/></div></div>
          <div className="printer-box">
            <div className="printer-screen">$$$</div>
            <div className="printer-lights"><div className="plight g"/><div className="plight y"/><div className="plight r"/></div>
            <div className="printer-slot"/><div className="bill-out">$$$</div>
          </div>
          <div className="gear-wrap"><div className="g-big"><GearSVG size={28} color="#f0b000"/></div><div className="g-sm"><GearSVG size={18} color="#00c96a"/></div></div>
        </div>

        <div className="hd-title">
          <div style={{display:'flex',justifyContent:'center',alignItems:'flex-end',gap:'6px',marginBottom:'8px'}}>
            {/* Your 4 avatars - unchanged */}
            <svg width="38" height="48" viewBox="0 0 38 48" fill="none"> {/* woman 1 */} <ellipse cx="19" cy="14" rx="9" ry="10" fill="#3d1f0a"/> <path d="M10 12 Q7 4 14 3 Q19 1 24 3 Q31 4 28 12 Q26 6 19 6 Q12 6 10 12Z" fill="#1a0a00"/> <ellipse cx="19" cy="34" rx="11" ry="13" fill="#8B4513"/> <rect x="12" y="28" width="14" height="18" rx="3" fill="#c0392b"/> </svg>
            <svg width="36" height="50" viewBox="0 0 36 50" fill="none"> {/* man 1 */} <ellipse cx="18" cy="13" rx="9" ry="9.5" fill="#2c0f05"/> <ellipse cx="18" cy="32" rx="11" ry="14" fill="#6B3410"/> <rect x="11" y="27" width="14" height="20" rx="3" fill="#1a3a5c"/> </svg>
            <div style={{textAlign:'center',padding:'0 8px'}}>
              <div className="main">FW WALKAWAY</div>
              <div className="sub">Prop Tracker · Money Machine · Let It Print</div>
            </div>
            <svg width="36" height="50" viewBox="0 0 36 50" fill="none"> {/* woman 2 */} <ellipse cx="18" cy="13" rx="9" ry="9.5" fill="#1a0800"/> <ellipse cx="18" cy="32" rx="11" ry="14" fill="#4a1a08"/> <rect x="11" y="27" width="14" height="20" rx="3" fill="#8B0000"/> </svg>
            <svg width="38" height="48" viewBox="0 0 38 48" fill="none"> {/* man 2 */} <ellipse cx="19" cy="13" rx="9" ry="9.5" fill="#3a1505"/> <ellipse cx="19" cy="32" rx="12" ry="14" fill="#5a2510"/> <rect x="12" y="27" width="14" height="20" rx="2" fill="#1a1a2e"/> </svg>
          </div>
        </div>

        <div className="hd-machine" style={{flexDirection:'row-reverse'}}>
          <div className="gear-wrap"><div className="g-big"><GearSVG size={34} color="#00c96a"/></div><div className="g-sm"><GearSVG size={21} color="#f0b000"/></div></div>
          <div className="printer-box">
            <div className="printer-screen">$$$</div>
            <div className="printer-lights"><div className="plight r"/><div className="plight y"/><div className="plight g"/></div>
            <div className="printer-slot"/><div className="bill-out bill-out2">$$$</div>
          </div>
          <div className="gear-wrap"><div className="g-big"><GearSVG size={28} color="#f0b000"/></div><div className="g-sm"><GearSVG size={18} color="#00c96a"/></div></div>
        </div>
      </div>

      <div className="header-ticker">
        <div className="ticker-txt">
          📈 MNQ · MES · MGC · MYM · MICRO FUTURES · TOLD YALL · FW WALKAWAY · PROTECT THE POOL · LET IT PRINT · PUT SOME RESPECT ON MY NAME · RISK MANAGED · STAY DISCIPLINED · COMPOUND THE GAINS · 📈 
        </div>
      </div>
    </div>
  );
}

function TrackerPage(){
  const [trades,setTrades] = useState([]);
  const [payouts,setPayouts] = useState([]);
  const [balance,setBalance] = useState('');
  const [drawdown,setDrawdown] = useState('');
  const [instrument,setInstrument] = useState('MNQ');
  const [form,setForm] = useState({label:'', pnl:'', outcome:'win', contracts:'', notes:''});
  const [payoutForm,setPayoutForm] = useState({label:'',amount:''});
  const [showPayouts,setShowPayouts] = useState(false);
  const [lastAdded,setLastAdded] = useState(null);

  // Auto load & save
  useEffect(() => {
    const saved = localStorage.getItem('fwWalkawayData');
    if (saved) {
      const data = JSON.parse(saved);
      setTrades(data.trades || []);
      setPayouts(data.payouts || []);
      setBalance(data.balance || '');
      setDrawdown(data.drawdown || '');
      setInstrument(data.instrument || 'MNQ');
    }
  }, []);

  useEffect(() => {
    localStorage.setItem('fwWalkawayData', JSON.stringify({trades, payouts, balance, drawdown, instrument}));
  }, [trades, payouts, balance, drawdown, instrument]);

  const inst = INSTRUMENTS[instrument];
  const startingDrawdown = parseFloat(drawdown) || 2500;

  const stats = useMemo(() => {
    const totalPnl = trades.reduce((s,t) => s + t.pnl, 0);
    const totalPayoutsAmt = payouts.reduce((s,p) => s + p.amount, 0);
    const currentPool = Math.max(0, startingDrawdown + totalPnl - totalPayoutsAmt);
    const riskPerTrade = currentPool / DIVISOR;
    const poolPct = Math.min(100, Math.max(0, ((startingDrawdown + totalPnl) / startingDrawdown) * 100));
    const wins = trades.filter(t => t.pnl > 0).length;
    const losses = trades.filter(t => t.pnl < 0).length;
    const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;
    const isBlownOut = totalPnl <= -startingDrawdown;
    const remaining = startingDrawdown + totalPnl;
    const netProfit = totalPnl - totalPayoutsAmt;

    return {totalPnl, totalPayoutsAmt, currentPool, riskPerTrade, poolPct, wins, losses, winRate, isBlownOut, remaining, netProfit};
  }, [trades, payouts, startingDrawdown]);

  const addTrade = () => {
    const v = parseFloat(form.pnl);
    const contracts = parseInt(form.contracts) || 1;
    if (!form.pnl || isNaN(v)) return;

    const finalPnl = form.outcome === 'win' ? Math.abs(v) : -Math.abs(v);
    const newId = Date.now();

    setTrades(prev => [{
      id: newId,
      label: form.label || `Trade ${prev.length+1}`,
      pnl: finalPnl,
      contracts: contracts,
      notes: form.notes || '',
      instrument,
      time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    }, ...prev]);

    setLastAdded(newId);
    setTimeout(() => setLastAdded(null), 1000);
    setForm({label:'', pnl:'', outcome:'win', contracts:'', notes:''});
  };

  const removeTrade = id => setTrades(p => p.filter(t => t.id !== id));

  const addPayout = () => {
    const amt = parseFloat(payoutForm.amount);
    if (!payoutForm.amount || isNaN(amt) || amt <= 0) return;
    setPayouts(prev => [{id:Date.now(), label:payoutForm.label || `Payout ${prev.length+1}`, amount:amt, date:new Date().toLocaleDateString([],{month:'short',day:'numeric'}), time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}, ...prev]);
    setPayoutForm({label:'', amount:''});
  };

  const removePayout = id => setPayouts(p => p.filter(x => x.id !== id));

  return (
    <div className="tracker-wrap">

      {/* Account Settings */}
      <div className="dark-card" style={{padding:'16px 20px',marginBottom:'12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <div style={{fontSize:'8px',letterSpacing:'3px',color:'var(--text2)',textTransform:'uppercase'}}>⚙️ Account Settings</div>
          <button onClick={()=>{setTrades([]);setPayouts([]);setBalance('');setDrawdown('');}} style={{fontSize:'7px',letterSpacing:'2px',color:'var(--text2)',background:'none',border:'1px solid var(--border)',borderRadius:'4px',padding:'4px 10px',cursor:'pointer'}}>Reset All</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
          <div className="input-group"><label className="input-label">Account Balance ($)</label><input className="tinput" type="number" placeholder="e.g. 150000" value={balance} onChange={e=>setBalance(e.target.value)}/></div>
          <div className="input-group"><label className="input-label">Max Drawdown ($)</label><input className="tinput" type="number" placeholder="e.g. 4500" value={drawdown} onChange={e=>setDrawdown(e.target.value)}/></div>
        </div>
      </div>

      {/* Instrument Toggle */}
      <div style={{display:'flex',background:'#060c1a',border:'1px solid var(--border)',borderRadius:'9px',padding:'4px',marginBottom:'12px',gap:'4px',flexWrap:'wrap'}}>
        {Object.values(INSTRUMENTS).map(i => (
          <button key={i.name} onClick={()=>setInstrument(i.name)} style={{
            flex:1, minWidth:'80px', padding:'11px', border:'none', borderRadius:'7px',
            background:instrument===i.name ? 'var(--card)' : 'transparent',
            color:instrument===i.name ? 'var(--green)' : 'var(--text2)',
            fontFamily:"'Bebas Neue',sans-serif", fontSize:'17px', letterSpacing:'3px'
          }}>
            {i.name}<div style={{fontSize:'7px',color:'var(--text3)'}}>{i.label}</div>
          </button>
        ))}
      </div>

      <div className="content-grid">

        {/* Centered Max Risk / Trade Box */}
        <div className="full-col dark-card risk-box" style={{marginBottom:'12px'}}>
          <div className="risk-label">MAX RISK PER TRADE</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'62px',color:'var(--green)',letterSpacing:'2px',lineHeight:1,textShadow:'0 0 30px #00c96a66'}}>
            ${stats.riskPerTrade.toFixed(0)}
          </div>
          <div className="risk-formula" style={{marginTop:'8px'}}>${stats.currentPool.toFixed(0)} pool ÷ {DIVISOR}</div>
        </div>

        {/* Log Trade - Now with Contracts and Notes */}
        <div className="dark-card" style={{padding:'16px 20px'}}>
          <div className="section-lbl">Log Trade</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
            <div className="input-group">
              <label className="input-label">Label</label>
              <input className="tinput" placeholder="e.g. Long MNQ Breakout" value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}/>
            </div>
            <div className="input-group">
              <label className="input-label">Outcome</label>
              <select className="tselect" value={form.outcome} onChange={e=>setForm(f=({...f,outcome:e.target.value}))}>
                <option value="win">WIN</option>
                <option value="loss">LOSS</option>
              </select>
            </div>
            <div className="input-group">
              <label className="input-label">Contracts</label>
              <input className="tinput" type="number" placeholder="e.g. 5" value={form.contracts} onChange={e=>setForm(f=({...f,contracts:e.target.value}))}/>
            </div>
            <div className="input-group">
              <label className="input-label">P&L Amount ($)</label>
              <input className="tinput" type="number" placeholder="e.g. 420" value={form.pnl} onChange={e=>setForm(f=({...f,pnl:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addTrade()}/>
            </div>
          </div>
          <div className="input-group" style={{marginBottom:'12px'}}>
            <label className="input-label">Notes / Setup</label>
            <input className="tinput" placeholder="e.g. 20-tick stop, strong volume" value={form.notes} onChange={e=>setForm(f=({...f,notes:e.target.value}))}/>
          </div>
          <button className="add-btn shimmer-btn" onClick={addTrade}>+ LOG TRADE</button>
        </div>

        {/* Trade Journal - Now shows contracts and notes */}
        <div className="dark-card log-section full-col">
          <div className="log-header">
            <div className="section-lbl" style={{margin:0}}>Trade Journal</div>
            {trades.length>0 && <button className="clear-btn" onClick={()=>setTrades([])}>CLEAR ALL</button>}
          </div>
          {trades.length===0 ? (
            <div className="empty-log">No trades yet — let it print 🖨️</div>
          ) : trades.map((t,i) => (
            <div key={t.id} style={{padding:'14px 20px',borderBottom:i<trades.length-1?'1px solid var(--border)':''}} className={lastAdded===t.id ? (t.pnl>=0?'win-row-anim':'loss-row-anim') : ''}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:'14px',fontWeight:'500'}}>{t.label} <span style={{fontSize:'12px',color:'var(--text2)'}}>×{t.contracts}</span></div>
                  <div style={{fontSize:'10px',color:'var(--text2)'}}>{t.time} · {t.instrument}</div>
                  {t.notes && <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>{t.notes}</div>}
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'21px',color:t.pnl>=0?'var(--green)':'var(--red)'}}>
                    {t.pnl>=0?'+':''}${Math.abs(t.pnl).toFixed(0)}
                  </div>
                  <button className="trade-del" onClick={()=>removeTrade(t.id)} style={{marginTop:'4px'}}>✕</button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Payouts section remains unchanged */}
        {/* ... (your original payouts code can stay the same) ... */}

      </div>
    </div>
  );
}

function App(){
  return <div><MoneyMachineHeader/><TrackerPage/></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
