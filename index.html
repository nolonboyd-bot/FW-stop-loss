<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNQ Trading Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f0f2f5; font-family: 'DM Mono', monospace; }

    /* TAB NAV */
    .tab-bar {
      display: flex;
      background: #ffffff;
      border-bottom: 1px solid #dde1e7;
      position: sticky;
      top: 0;
      z-index: 100;
      align-items: center;
      box-shadow: 0 1px 4px #00000011;
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      color: #9aa5b4;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;

    .tab-btn.active {
      color: #00b85c;
      border-bottom: 2px solid #00b85c;
    }
    .brand-center {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 4px;
      color: #00b85c;
      text-align: center;
      white-space: nowrap;
      padding-bottom: 2px;
    }

    /* SHARED */
    .page { display: none; }
    .page.active { display: block; }

    /* ===================== TRACKER PAGE ===================== */
    .tracker-wrap {
      min-height: 100vh;
      background: #f0f2f5;
      color: #1a2332;
      padding: 20px 24px 80px;
    }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr;

    }
    @media (min-width: 700px) {
      .tracker-wrap { padding: 24px 32px 80px; }
      .content-grid { grid-template-columns: 1fr 1fr; }
      .content-grid .full-col { grid-column: 1 / -1; }
    }
    @media (min-width: 1100px) {
      .tracker-wrap { padding: 28px 48px 80px; }
      .content-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .brand { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: #1a2332; }
    .session-badge { font-size: 9px; letter-spacing: 2px; color: #9aa5b4; text-transform: uppercase; }
    .health-card { background: #fff; border: 1px solid #dde1e7; border-radius: 8px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 4px #00000008; }
    .health-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
    .health-label { font-size: 8px; letter-spacing: 3px; color: #9aa5b4; text-transform: uppercase; }
    .health-pct { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; line-height: 1; }
    .bar-track { height: 6px; background: #eef0f3; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1), background 0.3s; }
    .health-sub { display: flex; justify-content: space-between; font-size: 9px; color: #9aa5b4; letter-spacing: 1px; }
    .metrics-row { display: contents; }
    .content-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .metric { background: #fff; border: 1px solid #dde1e7; border-radius: 8px; padding: 14px 12px; text-align: center; box-shadow: 0 1px 4px #00000008; }
    .metric-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
    .metric-label { font-size: 7px; letter-spacing: 2px; color: #9aa5b4; text-transform: uppercase; }
    .risk-box { background: #fff; border: 1px solid #dde1e7; border-radius: 8px; padding: 18px 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px #00000008; }
    .risk-label { font-size: 8px; letter-spacing: 3px; color: #6b7a8d; text-transform: uppercase; margin-bottom: 4px; }
    .risk-amount { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #00b85c; letter-spacing: 2px; line-height: 1; }
    .risk-formula { font-size: 10px; color: #9aa5b4; margin-top: 4px; letter-spacing: 1px; }
    .risk-pool-label { font-size: 8px; letter-spacing: 2px; color: #9aa5b4; text-transform: uppercase; margin-bottom: 4px; }
    .risk-pool-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #1a2332; letter-spacing: 1px; }
    .add-section { background: #fff; border: 1px solid #dde1e7; border-radius: 8px; padding: 18px 20px; margin-bottom: 12px; box-shadow: 0 1px 4px #00000008; }
    .section-title { font-size: 8px; letter-spacing: 3px; color: #9aa5b4; text-transform: uppercase; margin-bottom: 14px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-label { font-size: 8px; letter-spacing: 2px; color: #6b7a8d; text-transform: uppercase; }
    .tinput, .tselect {
      background: #f5f7fa; border: 1px solid #dde1e7; border-radius: 6px;
      padding: 9px 12px; color: #1a2332; font-family: 'DM Mono', monospace;
      font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%;

    .tinput:focus, .tselect:focus { border-color: #00b85c88; background: #fff; }

    .tselect option { background: #fff; color: #1a2332; }
    .full-width { grid-column: 1 / -1; }
    .add-btn {

    .clear-btn { font-size: 8px; letter-spacing: 2px; color: #9aa5b4; background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; text-transform: uppercase; }
    .clear-btn:hover { color: #e03a52; }
    .trade-row { display: grid; grid-template-columns: 28px 1fr auto auto; gap: 10px; align-items: center; padding: 11px 20px; border-bottom: 1px solid #eef0f3; }
    .trade-row:last-child { border-bottom: none; }
    .trade-num { font-size: 9px; color: #9aa5b4; text-align: center; }
    .trade-name { font-size: 12px; color: #1a2332; margin-bottom: 2px; }
    .trade-meta { font-size: 9px; color: #9aa5b4; letter-spacing: 1px; }
    .trade-pnl { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; text-align: right; }
    .trade-del { background: none; border: none; color: #c5cdd8; cursor: pointer; font-size: 14px; transition: color 0.2s; }
    .trade-del:hover { color: #e03a52; }
    .empty-log { padding: 30px 20px; text-align: center; font-size: 10px; color: #c5cdd8; letter-spacing: 2px; text-transform: uppercase; }
    .danger-banner { background: #fff0f3; border: 1px solid #e03a5233; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; font-size: 10px; color: #e03a52; letter-spacing: 1px; }
    .green { color: #00b85c; } .red { color: #e03a52; } .white { color: #1a2332; }

    /* ── MONEY MACHINE GRAPHICS ── */
    @keyframes roll { 0%{transform:translateY(0)} 100%{transform:translateY(-40px)} }
    @keyframes printOut { 0%{transform:translateY(-100%) scaleY(0);opacity:0} 60%{opacity:1} 100%{transform:translateY(60px) scaleY(1);opacity:0} }
    @keyframes coinSpin { 0%{transform:rotateY(0deg)} 100%{transform:rotateY(360deg)} }
    @keyframes floatUp { 0%{transform:translateY(0) rotate(-10deg);opacity:1} 100%{transform:translateY(-120px) rotate(15deg);opacity:0} }
    @keyframes floatUpR { 0%{transform:translateY(0) rotate(8deg);opacity:1} 100%{transform:translateY(-100px) rotate(-12deg);opacity:0} }
    @keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }
    @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 #00b85c44} 50%{box-shadow:0 0 0 8px #00b85c00} }
    @keyframes gear-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes gear-spin-rev { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
    @keyframes bill-slide { 0%{transform:translateX(-110%) skewX(-2deg);opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{transform:translateX(110%) skewX(2deg);opacity:0} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes bounce-coin { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-8px) scale(1.1)} 60%{transform:translateY(-4px) scale(1.05)} }
    @keyframes win-flash { 0%{background:#f0faf5} 30%{background:#c8f5dc} 100%{background:#f0faf5} }
    @keyframes loss-flash { 0%{background:#fff} 30%{background:#fff0f3} 100%{background:#fff} }
    @keyframes stack-in { 0%{transform:translateY(20px) scale(0.8);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }

    .money-machine-wrap {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #091420 100%);
      border-bottom: 2px solid #00b85c44;
      padding: 16px 20px 12px;
    }
    .ticker-tape {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 18px;
      background: #00b85c;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .ticker-text {
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: #fff;
      animation: ticker 18s linear infinite;
      padding-right: 60px;
    }
    .machine-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }
    .machine-left { display:flex; align-items:center; gap:14px; }
    .machine-title { color:#fff; }
    .machine-title .main { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:6px; color:#00b85c; line-height:1; }
    .machine-title .sub { font-size:8px; letter-spacing:3px; color:#4a6a8a; margin-top:2px; text-transform:uppercase; }

    .gear-group { position:relative; width:48px; height:48px; }
    .gear-big { position:absolute; top:0; left:0; animation: gear-spin 4s linear infinite; transform-origin:center; }
    .gear-sm { position:absolute; bottom:0; right:0; animation: gear-spin-rev 2.5s linear infinite; transform-origin:center; }

    .bill-machine {
      position: relative;
      width: 90px;
      height: 52px;
      background: linear-gradient(180deg, #1a2d4a 0%, #0f1e35 100%);
      border: 1px solid #2a4060;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bill-slot {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      background: #0a1020;
      border-radius: 2px;
      box-shadow: inset 0 1px 3px #000;
    }
    .bill-out {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 22px;
      background: linear-gradient(135deg, #1a6b3a, #00b85c, #1a6b3a);
      border-radius: 2px;
      border: 1px solid #00b85c88;
      animation: printOut 2.4s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      color: #fff;
      letter-spacing: 1px;
    }
    .machine-lights {
      display: flex;
      gap: 4px;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }
    .mlight {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .mlight.g { background:#00b85c; box-shadow:0 0 6px #00b85c; animation: pulse-green 1.2s ease-in-out infinite; }
    .mlight.y { background:#f0a500; box-shadow:0 0 6px #f0a500; animation: pulse-green 1.2s ease-in-out infinite 0.4s; }
    .mlight.r { background:#e03a52; box-shadow:0 0 6px #e03a52; animation: pulse-green 1.2s ease-in-out infinite 0.8s; }

    .float-coins {
      position: absolute;
      right: 20px; top: 4px;
      display: flex;
      gap: 8px;
      z-index: 1;
    }
    .fcoin {
      font-size: 16px;
      opacity: 0.5;
    }
    .fcoin:nth-child(1) { animation: floatUp 3s ease-in infinite; }
    .fcoin:nth-child(2) { animation: floatUp 3s ease-in infinite 1s; }
    .fcoin:nth-child(3) { animation: floatUpR 3s ease-in infinite 0.5s; }
    .fcoin:nth-child(4) { animation: floatUp 3s ease-in infinite 1.8s; }

    .win-row-anim { animation: win-flash 1s ease forwards; }
    .loss-row-anim { animation: loss-flash 1s ease forwards; }

    .shimmer-btn {
      background: linear-gradient(90deg, #00b85c 0%, #00d96a 40%, #00b85c 60%, #009e4f 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }
    .payout-shimmer {
      background: linear-gradient(90deg, #d4930a 0%, #f0c040 40%, #f0a500 60%, #d4930a 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }
    .stack-in { animation: stack-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ─────────────────────────────────────────────
// PROP TRACKER
// ─────────────────────────────────────────────
const DIVISOR = 7;

const INSTRUMENTS = {
  MNQ: { name: 'MNQ', label: 'Micro Nasdaq', tickValue: 0.50, tickSize: 0.25, defaultTicks: 40 },
  MGC: { name: 'MGC', label: 'Micro Gold',   tickValue: 1.00, tickSize: 0.10, defaultTicks: 25 },
};

function GearSVG({size, color}) {
  const r = size/2, teeth = 8, ir = r*0.55, tr = r*0.85, tw = 0.28;
  let d = '';
  for(let i=0;i<teeth;i++){
    const a0=(i*2*Math.PI/teeth)-Math.PI/teeth;
    const a1=a0+tw; const a2=a0+Math.PI/teeth-tw; const a3=a0+Math.PI/teeth;
    d+=`L${r+tr*Math.cos(a0)} ${r+tr*Math.sin(a0)} L${r+tr*Math.cos(a1)} ${r+tr*Math.sin(a1)} `;
    d+=`L${r+r*Math.cos(a2)} ${r+r*Math.sin(a2)} L${r+r*Math.cos(a3)} ${r+r*Math.sin(a3)} `;
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <path d={`M${r+tr} ${r} ${d}Z`} fill={color} opacity="0.9"/>
      <circle cx={r} cy={r} r={ir} fill="#0a1628"/>
      <circle cx={r} cy={r} r={ir*0.4} fill={color} opacity="0.6"/>
    </svg>
  );
}

function MoneyMachineHeader() {
  return (
    <div className="money-machine-wrap">
      <div className="float-coins">
        <span className="fcoin">💵</span>
        <span className="fcoin">🪙</span>
        <span className="fcoin">💰</span>
        <span className="fcoin">💵</span>
      </div>
      <div className="machine-body">
        <div className="machine-left">
          <div className="gear-group">
            <div className="gear-big"><GearSVG size={32} color="#00b85c"/></div>
            <div className="gear-sm" style={{bottom:-2,right:-2}}><GearSVG size={20} color="#f0a500"/></div>
          </div>
          <div className="bill-machine">
            <div className="machine-lights">
              <div className="mlight g"/><div className="mlight y"/><div className="mlight r"/>
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'9px',letterSpacing:'2px',color:'#4a6a8a',marginTop:'6px'}}>$$</div>
            <div className="bill-slot"/>
            <div className="bill-out">$$$</div>
          </div>
        </div>
        <div className="machine-title" style={{textAlign:'center',flex:1}}>
          <div className="main">FW WALKAWAY</div>
          <div className="sub">Prop Tracker · Money Machine</div>
        </div>
        <div className="machine-left" style={{flexDirection:'row-reverse'}}>
          <div className="gear-group">
            <div className="gear-big"><GearSVG size={32} color="#00b85c"/></div>
            <div className="gear-sm" style={{bottom:-2,left:-2,right:'auto'}}><GearSVG size={20} color="#f0a500"/></div>
          </div>
          <div className="bill-machine">
            <div className="machine-lights">
              <div className="mlight r"/><div className="mlight y"/><div className="mlight g"/>
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'9px',letterSpacing:'2px',color:'#4a6a8a',marginTop:'6px'}}>$$</div>
            <div className="bill-slot"/>
            <div className="bill-out" style={{animationDelay:'1.2s'}}>$$$</div>
          </div>
        </div>
      </div>
      <div className="ticker-tape">
        <div className="ticker-text">
          📈 MNQ · MGC · MICRO FUTURES · PROP TRADING · FW WALKAWAY · RISK MANAGED · STAY DISCIPLINED · PROTECT THE POOL · LET IT PRINT · 📈 MNQ · MGC · MICRO FUTURES · PROP TRADING · FW WALKAWAY · RISK MANAGED · STAY DISCIPLINED · PROTECT THE POOL · LET IT PRINT ·&nbsp;
        </div>
      </div>
    </div>
  );
}

function TrackerPage() {
  const [trades, setTrades] = useState([]);
  const [form, setForm] = useState({ label: '', pnl: '', outcome: 'win' });
  const [balance, setBalance] = useState('');
  const [drawdown, setDrawdown] = useState('');
  const [instrument, setInstrument] = useState('MNQ');
  const [payouts, setPayouts] = useState([]);
  const [payoutForm, setPayoutForm] = useState({ label: '', amount: '' });
  const [showPayouts, setShowPayouts] = useState(false);
  const [lastAdded, setLastAdded] = useState(null);

  const inst = INSTRUMENTS[instrument];
  const startingDrawdown = parseFloat(drawdown) || 2500;
  const startingBalance = parseFloat(balance) || 0;

  const stats = useMemo(() => {
    const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
    const totalPayoutsAmt = payouts.reduce((s, p) => s + p.amount, 0);
    const currentPool = Math.max(0, startingDrawdown + totalPnl - totalPayoutsAmt);
    const riskPerTrade = currentPool / DIVISOR;
    const poolPct = Math.min(100, Math.max(0, ((startingDrawdown + totalPnl) / startingDrawdown) * 100));
    const wins = trades.filter(t => t.pnl > 0).length;
    const losses = trades.filter(t => t.pnl < 0).length;
    const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;
    const isBlownOut = totalPnl <= -startingDrawdown;
    const remaining = startingDrawdown + totalPnl;
    const currentBalance = startingBalance + totalPnl;
    const netProfit = totalPnl - totalPayoutsAmt;
    return { totalPnl, totalPayoutsAmt, currentPool, riskPerTrade, poolPct, wins, losses, winRate, isBlownOut, remaining, currentBalance, netProfit };
  }, [trades, payouts, startingDrawdown, startingBalance]);

  const addPayout = () => {
    const amt = parseFloat(payoutForm.amount);
    if (!payoutForm.amount || isNaN(amt) || amt <= 0) return;
    setPayouts(prev => [{
      id: Date.now(),
      label: payoutForm.label || `Payout ${prev.length + 1}`,
      amount: amt,
      date: new Date().toLocaleDateString([], { month: 'short', day: 'numeric' }),
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    }, ...prev]);
    setPayoutForm({ label: '', amount: '' });
  };

  const removePayout = id => setPayouts(prev => prev.filter(p => p.id !== id));

  const barColor = stats.poolPct >= 60 ? '#00b85c' : stats.poolPct >= 30 ? '#f0a500' : '#e03a52';
  const maxContractsAtDefault = Math.floor(stats.riskPerTrade / (inst.defaultTicks * inst.tickValue));
  const tableMax = Math.max(maxContractsAtDefault + 3, 10);

  const addTrade = () => {
    const pnlVal = parseFloat(form.pnl);
    if (!form.pnl || isNaN(pnlVal)) return;
    const finalPnl = form.outcome === 'win' ? Math.abs(pnlVal) : -Math.abs(pnlVal);
    const newId = Date.now();
    setTrades(prev => [{
      id: newId,
      label: form.label || `Trade ${prev.length + 1}`,
      pnl: finalPnl,
      instrument,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    }, ...prev]);
    setLastAdded(newId);
    setTimeout(() => setLastAdded(null), 1000);
    setForm({ label: '', pnl: '', outcome: 'win' });
  };

  const removeTrade = id => setTrades(prev => prev.filter(t => t.id !== id));

  const tableRows = [];
  for (let c = tableMax; c >= 1; c--) {
    const maxTicks = Math.floor(stats.riskPerTrade / (c * inst.tickValue));
    const isAffordable = (c * inst.defaultTicks * inst.tickValue) <= stats.riskPerTrade;
    tableRows.push({ contracts: c, maxTicks, isAffordable });
  }

  return (
    <div className="tracker-wrap">

      {/* Account Settings — always visible at top */}
      <div style={{background:'#fff', border:'1px solid #dde1e7', borderRadius:'8px', padding:'16px 20px', marginBottom:'12px', boxShadow:'0 1px 4px #00000008'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
          <div style={{fontSize:'8px', letterSpacing:'3px', color:'#9aa5b4', textTransform:'uppercase'}}>Account Settings</div>
          {(balance || drawdown) && (
            <button onClick={() => { setTrades([]); setPayouts([]); setBalance(''); setDrawdown(''); }}
              style={{fontSize:'7px', letterSpacing:'2px', color:'#9aa5b4', background:'none', border:'1px solid #dde1e7', borderRadius:'4px', padding:'3px 8px', cursor:'pointer', fontFamily:"'DM Mono', monospace", textTransform:'uppercase'}}>
              Reset
            </button>
          )}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', alignItems:'end'}}>
          <div className="input-group">
            <label className="input-label">Account Balance ($)</label>
            <input className="tinput" type="number" placeholder="e.g. 50000"
              value={balance} onChange={e => setBalance(e.target.value)} />
          </div>
          <div className="input-group">
            <label className="input-label">Max Drawdown ($)</label>
            <input className="tinput" type="number" placeholder="e.g. 2500"
              value={drawdown} onChange={e => setDrawdown(e.target.value)} />
          </div>
        </div>
        {drawdown && (
          <div style={{marginTop:'10px', display:'flex', alignItems:'center', gap:'8px', background:'#f0faf5', border:'1px solid #b8e8cf', borderRadius:'6px', padding:'8px 14px'}}>
            <div style={{fontSize:'8px', letterSpacing:'2px', color:'#6b7a8d', textTransform:'uppercase'}}>Risk / Trade:</div>
            <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'22px', color:'#00b85c', letterSpacing:'2px', lineHeight:1}}>${(startingDrawdown / DIVISOR).toFixed(0)}</div>
            <div style={{fontSize:'9px', color:'#9aa5b4', letterSpacing:'1px'}}>${startingDrawdown.toLocaleString()} ÷ {DIVISOR}</div>
          </div>
        )}
      </div>

      {stats.isBlownOut && (
        <div className="danger-banner">⚠ DRAWDOWN LIMIT REACHED — STOP TRADING</div>
      )}

      {/* Instrument Toggle */}
      <div style={{display:'flex', background:'#f0f2f5', border:'1px solid #dde1e7', borderRadius:'8px', padding:'4px', marginBottom:'12px', gap:'4px'}}>
        {Object.values(INSTRUMENTS).map(i => (
          <button key={i.name} onClick={() => setInstrument(i.name)} style={{
            flex:1, padding:'10px', border:'none', borderRadius:'6px',
            background: instrument === i.name ? '#fff' : 'transparent',
            boxShadow: instrument === i.name ? '0 1px 4px #00000014' : 'none',
            fontFamily:"'Bebas Neue', sans-serif", fontSize:'16px', letterSpacing:'3px',
            color: instrument === i.name ? '#00b85c' : '#9aa5b4',
            cursor:'pointer', transition:'all 0.2s',
          }}>
            {i.name}
            <div style={{fontSize:'7px', letterSpacing:'1px', color: instrument === i.name ? '#6b7a8d' : '#c5cdd8', fontFamily:"'DM Mono', monospace", marginTop:'2px'}}>
              {i.label}
            </div>
          </button>
        ))}
      </div>

      {/* Health Bar */}
      <div className="content-grid" style={{marginBottom:'0'}}>
        <div className="health-card full-col">
        <div className="health-header">
          <div className="health-label">Account Health</div>
          <div className="health-pct" style={{color: barColor}}>
            {stats.isBlownOut ? 'BLOWN' : `${Math.round(stats.poolPct)}%`}
          </div>
        </div>
        <div className="bar-track">
          <div className="bar-fill" style={{width:`${Math.max(0,stats.poolPct)}%`, background:barColor, boxShadow:`0 0 10px ${barColor}66`}} />
        </div>
        <div className="health-sub">
          <span>Remaining: ${stats.remaining.toFixed(2)}</span>
          <span>DD Limit: ${startingDrawdown.toLocaleString()}</span>
        </div>
        </div>

        {/* Metrics */}
        <div className="metric">
          <div style={{fontSize:'20px', marginBottom:'4px'}}>📊</div>
          <div className={`metric-val ${stats.totalPnl >= 0 ? 'green' : 'red'}`}>
            {stats.totalPnl >= 0 ? '+' : ''}{stats.totalPnl.toFixed(0)}
          </div>
          <div className="metric-label">Total P&L</div>
        </div>
        <div className="metric">
          <div style={{fontSize:'20px', marginBottom:'4px'}}>🎯</div>
          <div className="metric-val white">{stats.winRate}%</div>
          <div className="metric-label">Win Rate</div>
        </div>
        <div className="metric">
          <div style={{fontSize:'20px', marginBottom:'4px'}}>⚡</div>
          <div className="metric-val white">{trades.length}</div>
          <div className="metric-label">Trades</div>
        </div>

        {/* Risk Box */}
        <div className="risk-box" style={{marginBottom:0}}>
          <div>
            <div className="risk-label">Max Risk / Trade</div>
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span style={{fontSize:'28px'}}>💰</span>
              <div className="risk-amount">${stats.riskPerTrade.toFixed(0)}</div>
            </div>
            <div className="risk-formula">${stats.currentPool.toFixed(0)} pool ÷ {DIVISOR}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="risk-pool-label">Current Pool</div>
            <div className="risk-pool-val">${stats.currentPool.toFixed(2)}</div>
            <div style={{fontSize:'9px',color:'#9aa5b4',marginTop:4}}>{stats.wins}W · {stats.losses}L</div>
            {stats.wins > 0 && stats.losses === 0 && <div style={{fontSize:'9px',color:'#f0a500',marginTop:4,letterSpacing:'1px'}}>🔥 PERFECT SESSION</div>}
            {stats.wins >= 3 && stats.wins > stats.losses * 2 && <div style={{fontSize:'9px',color:'#00b85c',marginTop:4,letterSpacing:'1px'}}>📈 ON FIRE</div>}
          </div>
        </div>

        {/* ── BOTTOM ROW: Contracts LEFT | Log+Journal+Payouts RIGHT ── */}
        <div className="full-col" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', alignItems:'start'}}>

          {/* LEFT — Contracts Table */}
          <div style={{background:'#fff', border:'1px solid #dde1e7', borderRadius:'8px', padding:'16px 20px', boxShadow:'0 1px 4px #00000008'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
              <div style={{fontSize:'8px', letterSpacing:'3px', color:'#6b7a8d', textTransform:'uppercase'}}>{inst.name} Contracts</div>
              <div style={{fontSize:'8px', letterSpacing:'2px', color:'#6b7a8d', textTransform:'uppercase'}}>1 Tick = ${inst.tickValue.toFixed(2)}</div>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px', marginBottom:'6px'}}>
              {['Contracts','Max Stop Ticks'].map(h => (
                <div key={h} style={{fontSize:'7px', letterSpacing:'2px', color:'#9aa5b4', textTransform:'uppercase', textAlign:'center', padding:'4px 0'}}>{h}</div>
              ))}
            </div>
            {tableRows.map(({contracts, maxTicks, isAffordable}) => (
              <div key={contracts} style={{
                display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px', marginBottom:'3px',
                background: isAffordable ? '#f0faf5' : '#fafbfc',
                border: isAffordable ? '1px solid #b8e8cf' : '1px solid #eef0f3',
                borderRadius:'6px', padding:'8px', opacity: isAffordable ? 1 : 0.4,
                transition:'all 0.3s',
              }}>
                <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize: isAffordable ? '20px' : '16px', color: isAffordable ? '#00b85c' : '#c5cdd8', textAlign:'center', lineHeight:1}}>{contracts}</div>
                <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize: isAffordable ? '20px' : '16px', color: isAffordable ? '#d4930a' : '#c5cdd8', textAlign:'center', lineHeight:1}}>{maxTicks}</div>
              </div>
            ))}
            <div style={{marginTop:'10px', fontSize:'8px', color:'#9aa5b4', letterSpacing:'1px', textAlign:'center'}}>
              count your stop ticks → match to contracts row
            </div>
          </div>

          {/* RIGHT — Log Trade + Trade Journal + Payouts stacked */}
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>

            {/* Log Trade */}
            <div style={{background:'#fff', border:'1px solid #dde1e7', borderRadius:'8px', padding:'16px 20px', boxShadow:'0 1px 4px #00000008'}}>
              <div style={{fontSize:'8px', letterSpacing:'3px', color:'#9aa5b4', textTransform:'uppercase', marginBottom:'14px'}}>Log Trade</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px'}}>
                <div className="input-group">
                  <label className="input-label">Label</label>
                  <input className="tinput" style={{fontSize:'14px', padding:'11px 14px'}} placeholder="e.g. Long MNQ" value={form.label} onChange={e => setForm(f => ({...f, label:e.target.value}))} />
                </div>
                <div className="input-group">
                  <label className="input-label">Outcome</label>
                  <select className="tselect" style={{fontSize:'14px', padding:'11px 14px'}} value={form.outcome} onChange={e => setForm(f => ({...f, outcome:e.target.value}))}>
                    <option value="win">WIN</option>
                    <option value="loss">LOSS</option>
                  </select>
                </div>
                <div className="input-group" style={{gridColumn:'1/-1'}}>
                  <label className="input-label">Dollar Amount ($)</label>
                  <input className="tinput" style={{fontSize:'14px', padding:'11px 14px'}} type="number" placeholder="e.g. 350" value={form.pnl}
                    onChange={e => setForm(f => ({...f, pnl:e.target.value}))}
                    onKeyDown={e => e.key === 'Enter' && addTrade()} />
                </div>
              </div>
              <button className="add-btn shimmer-btn" style={{padding:'14px', fontSize:'17px'}} onClick={addTrade}>+ LOG TRADE</button>
            </div>

            {/* Trade Journal */}
            <div style={{background:'#fff', border:'1px solid #dde1e7', borderRadius:'8px', overflow:'hidden', boxShadow:'0 1px 4px #00000008'}}>
              <div style={{padding:'16px 20px', borderBottom:'1px solid #eef0f3', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div style={{fontSize:'8px', letterSpacing:'3px', color:'#9aa5b4', textTransform:'uppercase'}}>Trade Journal</div>
                {trades.length > 0 && <button className="clear-btn" onClick={() => setTrades([])}>CLEAR ALL</button>}
              </div>
              {trades.length === 0 ? (
                <div style={{padding:'36px 20px', textAlign:'center', fontSize:'11px', color:'#c5cdd8', letterSpacing:'2px', textTransform:'uppercase'}}>No trades yet</div>
              ) : trades.map((t, i) => (
                <div key={t.id} className={lastAdded === t.id ? (t.pnl >= 0 ? 'win-row-anim' : 'loss-row-anim') : ''} style={{display:'grid', gridTemplateColumns:'32px 1fr auto auto', gap:'12px', alignItems:'center', padding:'14px 20px', borderBottom: i < trades.length - 1 ? '1px solid #eef0f3' : 'none', borderRadius: lastAdded === t.id ? '6px' : '0', transition:'background 0.3s'}}>
                  <div style={{fontSize:'10px', color:'#9aa5b4', textAlign:'center'}}>{trades.length - i}</div>
                  <div>
                    <div style={{fontSize:'14px', color:'#1a2332', marginBottom:'3px'}}>{t.label}</div>
                    <div style={{fontSize:'10px', color:'#9aa5b4', letterSpacing:'1px'}}>{t.time}{t.instrument ? ` · ${t.instrument}` : ''}</div>
                  </div>
                  <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'20px', letterSpacing:'1px', textAlign:'right'}} className={t.pnl >= 0 ? 'green' : 'red'}>
                    {t.pnl >= 0 ? '+' : ''}${Math.abs(t.pnl).toFixed(0)}
                  </div>
                  <button className="trade-del" style={{fontSize:'16px'}} onClick={() => removeTrade(t.id)}>✕</button>
                </div>
              ))}
            </div>

            {/* Payouts */}
            <div style={{background:'#fff', border:'1px solid #dde1e7', borderRadius:'8px', overflow:'hidden', boxShadow:'0 1px 4px #00000008'}}>
              <div style={{padding:'16px 20px', borderBottom:'1px solid #eef0f3', display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer'}} onClick={() => setShowPayouts(v => !v)}>
                <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                  <div style={{fontSize:'8px', letterSpacing:'3px', color:'#9aa5b4', textTransform:'uppercase'}}>Payouts</div>
                  {payouts.length > 0 && (
                    <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'18px', color:'#f0a500', letterSpacing:'1px'}}>
                      ${stats.totalPayoutsAmt.toFixed(0)} total
                    </div>
                  )}
                </div>
                <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                  {payouts.length > 0 && (
                    <div style={{fontSize:'9px', letterSpacing:'2px', color:'#9aa5b4', textTransform:'uppercase'}}>
                      {payouts.length} payout{payouts.length !== 1 ? 's' : ''}
                    </div>
                  )}
                  <div style={{color:'#9aa5b4', fontSize:'16px', transition:'transform 0.2s', transform: showPayouts ? 'rotate(180deg)' : 'rotate(0deg)'}}>▾</div>
                </div>
              </div>

              {showPayouts && (
                <div style={{padding:'16px 20px'}}>
                  {payouts.length > 0 && (
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px', marginBottom:'16px'}}>
                      <div style={{background:'#f0faf5', border:'1px solid #b8e8cf', borderRadius:'6px', padding:'12px', textAlign:'center'}}>
                        <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'22px', color:'#00b85c', letterSpacing:'1px', lineHeight:1}}>${stats.totalPnl.toFixed(0)}</div>
                        <div style={{fontSize:'7px', letterSpacing:'2px', color:'#6b7a8d', textTransform:'uppercase', marginTop:'5px'}}>Gross P&L</div>
                      </div>
                      <div style={{background:'#fff8ec', border:'1px solid #f0a50033', borderRadius:'6px', padding:'12px', textAlign:'center'}}>
                        <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'22px', color:'#f0a500', letterSpacing:'1px', lineHeight:1}}>-${stats.totalPayoutsAmt.toFixed(0)}</div>
                        <div style={{fontSize:'7px', letterSpacing:'2px', color:'#6b7a8d', textTransform:'uppercase', marginTop:'5px'}}>Paid Out</div>
                      </div>
                      <div style={{background:'#f5f7fa', border:'1px solid #dde1e7', borderRadius:'6px', padding:'12px', textAlign:'center'}}>
                        <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'22px', color: stats.netProfit >= 0 ? '#1a2332' : '#e03a52', letterSpacing:'1px', lineHeight:1}}>${stats.netProfit.toFixed(0)}</div>
                        <div style={{fontSize:'7px', letterSpacing:'2px', color:'#6b7a8d', textTransform:'uppercase', marginTop:'5px'}}>Net Profit</div>
                      </div>
                    </div>
                  )}
                  <div style={{marginBottom:'14px'}}>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px'}}>
                      <div className="input-group">
                        <label className="input-label">Label</label>
                        <input className="tinput" style={{fontSize:'14px', padding:'11px 14px'}} placeholder="e.g. Weekly payout" value={payoutForm.label} onChange={e => setPayoutForm(f => ({...f, label:e.target.value}))} />
                      </div>
                      <div className="input-group">
                        <label className="input-label">Amount ($)</label>
                        <input className="tinput" style={{fontSize:'14px', padding:'11px 14px'}} type="number" placeholder="e.g. 500" value={payoutForm.amount}
                          onChange={e => setPayoutForm(f => ({...f, amount:e.target.value}))}
                          onKeyDown={e => e.key === 'Enter' && addPayout()} />
                      </div>
                    </div>
                    <button className="add-btn payout-shimmer" style={{padding:'14px', fontSize:'17px', background:'none'}} onClick={addPayout}>+ LOG PAYOUT</button>
                  </div>
                  {payouts.length === 0 ? (
                    <div style={{padding:'20px 0 4px', textAlign:'center', fontSize:'11px', color:'#c5cdd8', letterSpacing:'2px', textTransform:'uppercase'}}>No payouts logged yet</div>
                  ) : (
                    <div style={{borderTop:'1px solid #eef0f3', marginTop:'4px'}}>
                      {payouts.length > 1 && (
                        <div style={{display:'flex', justifyContent:'flex-end', padding:'8px 0'}}>
                          <button className="clear-btn" onClick={() => setPayouts([])}>CLEAR ALL</button>
                        </div>
                      )}
                      {payouts.map((p, i) => (
                        <div key={p.id} style={{display:'grid', gridTemplateColumns:'32px 1fr auto auto', gap:'12px', alignItems:'center', padding:'13px 0', borderBottom: i < payouts.length - 1 ? '1px solid #eef0f3' : 'none'}}>
                          <div style={{fontSize:'10px', color:'#9aa5b4', textAlign:'center'}}>{payouts.length - i}</div>
                          <div>
                            <div style={{fontSize:'14px', color:'#1a2332', marginBottom:'3px'}}>{p.label}</div>
                            <div style={{fontSize:'10px', color:'#9aa5b4', letterSpacing:'1px'}}>{p.date} · {p.time}</div>
                          </div>
                          <div style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:'20px', color:'#f0a500', letterSpacing:'1px', textAlign:'right'}}>
                            +${p.amount.toFixed(0)}
                          </div>
                          <button className="trade-del" style={{fontSize:'16px'}} onClick={() => removePayout(p.id)}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

          </div>{/* end RIGHT col */}
        </div>{/* end BOTTOM ROW */}

      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP SHELL
// ─────────────────────────────────────────────
function App() {
  return (
    <div>
      <MoneyMachineHeader />
      <TrackerPage />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
